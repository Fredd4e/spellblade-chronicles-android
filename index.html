<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellblade Chronicles</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .fantasy-title { font-family: Georgia, serif; }
    .game-container { max-width: 680px; margin: 0 auto; }
    .rpg-btn { transition: all 0.1s ease; }
    .rpg-btn:active { transform: scale(0.96); }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="game-container min-h-screen p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <div>
            <h1 class="fantasy-title text-3xl text-amber-400">Spellblade Chronicles</h1>
        </div>
        <div onclick="renameCharacter()" class="text-right cursor-pointer">
            <div id="player-name" class="font-bold text-xl text-amber-300">Aether</div>
            <div class="text-xs text-zinc-400">Level <span id="level">1</span> Spellblade</div>
        </div>
    </div>

    <!-- Stats -->
    <div class="bg-zinc-900 rounded-2xl p-4 mb-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="flex justify-between text-sm mb-1"><span><i class="fas fa-heart text-red-500"></i> HP</span> <span id="hp">50/50</span></div>
                <div class="h-2.5 bg-zinc-800 rounded-full"><div id="hp-bar" class="h-2.5 bg-green-500 rounded-full" style="width:100%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-sm mb-1"><span><i class="fas fa-magic text-blue-400"></i> MP</span> <span id="mp">20/20</span></div>
                <div class="h-2.5 bg-zinc-800 rounded-full"><div id="mp-bar" class="h-2.5 bg-blue-500 rounded-full" style="width:100%"></div></div>
            </div>
        </div>
        <div class="flex justify-between mt-3 text-sm">
            <div>XP: <span id="xp" class="font-bold">0/100</span></div>
            <div>Gold: <span id="gold" class="font-bold text-yellow-400">20</span></div>
            <div class="text-xs">STR <span id="str">5</span> • INT <span id="int">5</span> • DEF <span id="def">3</span></div>
        </div>
    </div>

    <!-- Story Log -->
    <div class="bg-zinc-900 rounded-2xl mb-4 overflow-hidden">
        <div onclick="toggleStory()" class="px-4 py-2.5 flex justify-between items-center cursor-pointer bg-zinc-950">
            <span class="font-semibold flex items-center gap-2"><i class="fas fa-book text-amber-400"></i> Story Log</span>
            <i id="story-icon" class="fas fa-chevron-up"></i>
        </div>
        <div id="story-box" class="p-4 max-h-[220px] overflow-auto text-sm">
            <div id="story"></div>
        </div>
    </div>

    <!-- Location -->
    <div class="flex justify-between items-center mb-2 px-1">
        <div class="font-bold flex items-center gap-2"><i class="fas fa-map-marker-alt text-emerald-400"></i> <span id="location">Eldoria Village Square</span></div>
        <button onclick="showMap()" class="text-sm px-3 py-1 bg-zinc-800 rounded-full flex items-center gap-1"><i class="fas fa-map"></i> <span>Map</span></button>
    </div>

    <!-- Actions -->
    <div id="actions" class="grid grid-cols-2 gap-3 mb-4"></div>

    <!-- Combat -->
    <div id="combat" class="hidden bg-zinc-900 border border-red-900 rounded-2xl p-4 mb-4">
        <div class="flex justify-between mb-3">
            <div><span class="text-red-400 font-bold" id="enemy-name"></span><br><span class="text-xs">HP: <span id="enemy-hp"></span>/<span id="enemy-max"></span></span></div>
            <div class="text-xs text-right">Enemy ATK: <span id="enemy-atk" class="font-bold"></span></div>
        </div>
        <div id="combat-log" class="bg-black/50 rounded p-3 text-xs h-20 overflow-auto mb-3 font-mono"></div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="swordAttack()" class="bg-red-600 py-2.5 rounded-xl font-bold">Sword Attack</button>
            <button onclick="castSpell()" class="bg-blue-600 py-2.5 rounded-xl font-bold" id="spell-btn">Cast Firebolt</button>
            <button onclick="defend()" class="bg-zinc-700 py-2.5 rounded-xl">Defend</button>
            <button onclick="flee()" class="bg-zinc-700 py-2.5 rounded-xl">Flee</button>
        </div>
    </div>

    <!-- Quick buttons -->
    <div class="flex gap-2 justify-center">
        <button onclick="showInventory()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Inventory</button>
        <button onclick="showStats()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Character</button>
        <button onclick="save()" class="px-4 py-2 bg-emerald-800 rounded-xl text-sm">Save</button>
    </div>
</div>

<!-- Map Modal -->
<div id="map-modal" class="hidden fixed inset-0 bg-black/70 flex items-end justify-center" onclick="if(event.target.id==='map-modal') hideMap()">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
        <div class="flex justify-between mb-4"><h3 class="font-bold text-lg">World Map</h3><button onclick="hideMap()" class="text-xl">&times;</button></div>
        <div onclick="travel('village')" class="p-3 bg-zinc-800 rounded-2xl mb-2 cursor-pointer flex gap-3 items-center"><i class="fas fa-home text-emerald-400 text-xl w-6"></i> <div><div class="font-bold">Eldoria Village</div><div class="text-xs text-zinc-400">Elder, Shop, Inn</div></div></div>
        <div onclick="travel('woods')" class="p-3 bg-zinc-800 rounded-2xl mb-2 cursor-pointer flex gap-3 items-center"><i class="fas fa-tree text-emerald-400 text-xl w-6"></i> <div><div class="font-bold">Whispering Woods</div><div class="text-xs text-zinc-400">Combat & Loot</div></div></div>
        <div onclick="travel('ruins')" class="p-3 bg-zinc-800 rounded-2xl cursor-pointer flex gap-3 items-center"><i class="fas fa-archway text-emerald-400 text-xl w-6"></i> <div><div class="font-bold">Ruined Temple <span class="text-xs text-amber-400">(Level 3+)</span></div></div></div>
    </div>
</div>

<!-- Inventory Modal -->
<div id="inv-modal" class="hidden fixed inset-0 bg-black/70 flex items-end justify-center" onclick="if(event.target.id==='inv-modal') hideInv()">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
        <div class="flex justify-between mb-3"><h3 class="font-bold">Inventory</h3><button onclick="hideInv()" class="text-xl">&times;</button></div>
        <div id="inv-list" class="space-y-2 max-h-[50vh] overflow-auto"></div>
    </div>
</div>

<script>
let state = {
    player: { name: "Aether", level: 1, hp: 50, maxHp: 50, mp: 20, maxMp: 20, xp: 0, gold: 20, str: 5, int: 5, def: 3,
        weapon: {name: "Rusty Sword", bonus: 3}, armor: {name: "Cloth Tunic", bonus: 1}, spells: ["Firebolt"] },
    inventory: [{id:1, name:"Health Potion", type:"consumable", bonus:30, desc:"Restores 30 HP"}],
    location: "village", locationName: "Eldoria Village Square",
    quest: 0, kills: 0, inCombat: false, enemy: null, story: []
};

let storyOpen = true;

function log(msg, important = false) {
    state.story.push({msg, important});
    if (state.story.length > 12) state.story.shift();
    renderStory();
}

function renderStory() {
    const el = document.getElementById('story');
    el.innerHTML = '';
    state.story.slice(-8).forEach(s => {
        const p = document.createElement('p');
        p.className = `mb-1.5 text-sm ${s.important ? 'text-amber-300 font-medium' : 'text-zinc-300'}`;
        p.innerHTML = s.msg;
        el.appendChild(p);
    });
}

function updateStats() {
    const p = state.player;
    document.getElementById('player-name').textContent = p.name;
    document.getElementById('level').textContent = p.level;
    document.getElementById('hp').textContent = `${p.hp}/${p.maxHp}`;
    document.getElementById('mp').textContent = `${p.mp}/${p.maxMp}`;
    document.getElementById('xp').textContent = `${p.xp}/${p.level * 80 + 20}`;
    document.getElementById('gold').textContent = p.gold;
    document.getElementById('str').textContent = p.str;
    document.getElementById('int').textContent = p.int;
    document.getElementById('def').textContent = p.def;

    document.getElementById('hp-bar').style.width = Math.max(0, (p.hp / p.maxHp) * 100) + '%';
    document.getElementById('mp-bar').style.width = Math.max(0, (p.mp / p.maxMp) * 100) + '%';
    document.getElementById('location').textContent = state.locationName;
}

function toggleStory() {
    const box = document.getElementById('story-box');
    const icon = document.getElementById('story-icon');
    storyOpen = !storyOpen;
    box.style.display = storyOpen ? 'block' : 'none';
    icon.className = storyOpen ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
}

function renderActions() {
    const container = document.getElementById('actions');
    container.innerHTML = '';
    const loc = state.location;

    if (state.inCombat) {
        document.getElementById('combat').classList.remove('hidden');
        return;
    }
    document.getElementById('combat').classList.add('hidden');

    let html = '';
    if (loc === 'village') {
        html += `<button onclick="talkElder()" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-user-tie text-amber-400 w-5"></i><span>Talk to Elder</span></button>`;
        html += `<button onclick="openShop()" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-store text-emerald-400 w-5"></i><span>Visit Merchant</span></button>`;
        html += `<button onclick="restInn()" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-bed text-blue-400 w-5"></i><span>Rest at Inn (8g)</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 hover:bg-emerald-800 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-map w-5"></i><span>World Map</span></button>`;
    } else if (loc === 'woods') {
        html += `<button onclick="startFight()" class="rpg-btn bg-red-900/70 hover:bg-red-800 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-skull w-5"></i><span>Look for Combat</span></button>`;
        html += `<button onclick="searchLoot()" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-search text-amber-400 w-5"></i><span>Search for Loot</span></button>`;
        html += `<button onclick="travel('village')" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-home text-emerald-400 w-5"></i><span>Return to Village</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 hover:bg-emerald-800 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-map w-5"></i><span>World Map</span></button>`;
    } else if (loc === 'ruins') {
        html += `<button onclick="exploreRuins()" class="rpg-btn bg-purple-900/70 hover:bg-purple-800 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-archway w-5"></i><span>Explore Temple</span></button>`;
        html += `<button onclick="travel('woods')" class="rpg-btn bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-arrow-left text-emerald-400 w-5"></i><span>Back to Woods</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 hover:bg-emerald-800 p-3 rounded-2xl text-left flex gap-3 items-center"><i class="fas fa-map w-5"></i><span>World Map</span></button>`;
    }
    container.innerHTML = html;
}

function updateAll() {
    updateStats();
    renderActions();
    renderStory();
}

function talkElder() {
    if (state.quest === 0) {
        log("<b>Elder:</b> 'Clear threats in the Whispering Woods. Return when done.'", true);
        state.quest = 1;
    } else if (state.quest === 1 && state.kills >= 3) {
        state.player.gold += 40;
        state.quest = 2;
        log("<b>Elder:</b> 'Excellent work! Take this gold and explore the Ruined Temple.'", true);
    } else {
        log("<b>Elder:</b> 'The woods still need cleaning.'");
    }
    updateAll();
    save();
}

function openShop() {
    const choice = prompt("What would you like to buy?\n1. Iron Sword (+7 dmg) - 55g\n2. Leather Armor (+4 def) - 45g\n3. Health Potion - 12g\n4. Mana Potion - 15g\n5. Learn Heal Spell - 80g");
    const p = state.player;
    if (!choice) return;
    if (choice === "1" && p.gold >= 55) { p.gold -= 55; p.weapon = {name:"Iron Sword", bonus:7}; log("You equipped an Iron Sword!"); }
    else if (choice === "2" && p.gold >= 45) { p.gold -= 45; p.armor = {name:"Leather Armor", bonus:4}; log("You equipped Leather Armor!"); }
    else if (choice === "3" && p.gold >= 12) { p.gold -= 12; state.inventory.push({id:Date.now(), name:"Health Potion", type:"consumable", bonus:30, desc:"Restores 30 HP"}); log("Bought Health Potion."); }
    else if (choice === "4" && p.gold >= 15) { p.gold -= 15; state.inventory.push({id:Date.now(), name:"Mana Potion", type:"consumable", bonus:15, desc:"Restores 15 MP"}); log("Bought Mana Potion."); }
    else if (choice === "5" && p.gold >= 80 && !p.spells.includes("Heal")) { p.gold -= 80; p.spells.push("Heal"); log("You learned the Heal spell!"); }
    else log("Not enough gold or invalid choice.");
    updateAll(); save();
}

function restInn() {
    if (state.player.gold < 8) { log("Not enough gold."); return; }
    state.player.gold -= 8;
    state.player.hp = state.player.maxHp;
    state.player.mp = state.player.maxMp;
    log("You rest at the inn and fully recover.", true);
    updateAll(); save();
}

function startFight() {
    const enemies = [
        {name:"Goblin Scout", hp:22, maxHp:22, atk:7, def:2, xp:18, gold:6},
        {name:"Forest Wolf", hp:32, maxHp:32, atk:8, def:3, xp:26, gold:9},
        {name:"Shadow Imp", hp:18, maxHp:18, atk:6, def:1, xp:15, gold:7}
    ];
    state.enemy = enemies[Math.floor(Math.random()*enemies.length)];
    state.inCombat = true;
    document.getElementById('combat-log').innerHTML = '';
    addCombatLog(`You encounter a <b>${state.enemy.name}</b>!`, true);
    updateCombatUI();
    renderActions();
}

function searchLoot() {
    if (Math.random() < 0.55) {
        const g = Math.floor(Math.random()*9) + 5;
        state.player.gold += g;
        log(`You found <b>${g} Gold</b> while searching!`, true);
    } else {
        log("You searched but found nothing useful.");
    }
    updateAll();
}

function exploreRuins() {
    if (Math.random() > 0.4) {
        state.enemy = {name:"Skeleton Warrior", hp:45, maxHp:45, atk:9, def:5, xp:35, gold:18};
        state.inCombat = true;
        document.getElementById('combat-log').innerHTML = '';
        addCombatLog(`A <b>${state.enemy.name}</b> rises from the shadows!`, true);
        updateCombatUI();
    } else {
        state.player.gold += 25;
        state.inventory.push({id:Date.now(), name:"Health Potion", type:"consumable", bonus:30, desc:"Restores 30 HP"});
        log("You found a chest with gold and a potion!");
    }
    updateAll();
}

function addCombatLog(msg, imp=false) {
    const logEl = document.getElementById('combat-log');
    const d = document.createElement('div');
    d.className = imp ? 'text-amber-300' : '';
    d.innerHTML = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
}

function updateCombatUI() {
    const e = state.enemy;
    if (!e) return;
    document.getElementById('enemy-name').innerHTML = e.name;
    document.getElementById('enemy-hp').innerHTML = e.hp;
    document.getElementById('enemy-max').innerHTML = e.maxHp;
    document.getElementById('enemy-atk').innerHTML = e.atk;
    document.getElementById('spell-btn').textContent = state.player.spells.includes("Heal") ? "Cast Spell" : "Cast Firebolt";
}

function swordAttack() {
    if (!state.inCombat || !state.enemy) return;
    const e = state.enemy; const p = state.player;
    let dmg = Math.max(4, Math.floor(5 + p.str * 1.1 + (p.weapon.bonus || 0) - e.def * 0.7 + Math.random() * 4));
    e.hp -= dmg;
    addCombatLog(`You hit for <span class="text-red-400 font-bold">${dmg}</span> damage.`);
    if (e.hp <= 0) return victory();
    enemyAttack();
    updateCombatUI();
}

function castSpell() {
    if (!state.inCombat || !state.enemy) return;
    const p = state.player; const e = state.enemy;
    if (p.mp < 8) { addCombatLog("Not enough MP!"); return; }
    p.mp -= 8;
    let dmg = Math.floor(10 + p.int * 1.5);
    e.hp -= dmg;
    addCombatLog(`Spell deals <span class="text-blue-400 font-bold">${dmg}</span> damage!`);
    if (e.hp <= 0) return victory();
    enemyAttack();
    updateCombatUI();
}

function defend() {
    if (!state.inCombat) return;
    const e = state.enemy;
    let dmg = Math.max(1, Math.floor(e.atk * 0.6 - state.player.def));
    state.player.hp = Math.max(0, state.player.hp - dmg);
    addCombatLog(`You defend and take <span class="text-red-400">${dmg}</span> damage.`);
    if (state.player.hp <= 0) death();
    else enemyAttack();
    updateCombatUI();
}

function flee() {
    if (Math.random() < 0.5) {
        log("You successfully fled!");
        endCombat();
    } else {
        addCombatLog("Flee failed!");
        enemyAttack();
        updateCombatUI();
    }
}

function enemyAttack() {
    const e = state.enemy; const p = state.player;
    let dmg = Math.max(1, Math.floor(e.atk - p.def * 0.8 + Math.random() * 3));
    p.hp -= dmg;
    addCombatLog(`${e.name} hits you for <span class="text-red-400">${dmg}</span> damage.`);
    if (p.hp <= 0) death();
}

function victory() {
    const e = state.enemy; const p = state.player;
    p.gold += e.gold || 8;
    p.xp += e.xp || 20;
    state.kills++;
    addCombatLog(`<b class="text-emerald-400">Victory!</b> +${e.xp} XP`, true);
    log(`You defeated the ${e.name}!`, true);
    if (Math.random() < 0.5) {
        state.inventory.push({id:Date.now(), name:"Health Potion", type:"consumable", bonus:30, desc:"Restores 30 HP"});
        log("You looted a Health Potion!");
    }
    if (state.kills === 4 && !p.spells.includes("Heal")) {
        p.spells.push("Heal");
        log("You learned the <b>Heal</b> spell!", true);
    }
    levelUpCheck();
    endCombat();
}

function death() {
    addCombatLog("<b class='text-red-500'>You have been defeated...</b>");
    setTimeout(() => {
        log("You wake up back in the village...", true);
        state.player.hp = Math.floor(state.player.maxHp * 0.4);
        state.location = "village";
        state.locationName = "Eldoria Village Square";
        endCombat();
    }, 1400);
}

function levelUpCheck() {
    const p = state.player;
    if (p.xp >= p.level * 80 + 20) {
        p.level++;
        p.xp = 0;
        p.maxHp += 8; p.hp = p.maxHp;
        p.maxMp += 4; p.mp = p.maxMp;
        p.str++; p.int++; p.def++;
        log(`<b>LEVEL UP!</b> You are now Level ${p.level}!`, true);
    }
}

function endCombat() {
    state.inCombat = false;
    state.enemy = null;
    document.getElementById('combat').classList.add('hidden');
    renderActions();
    updateAll();
    save();
}

function travel(dest) {
    hideMap();
    if (dest === "village") { state.location = "village"; state.locationName = "Eldoria Village Square"; log("You return to the village."); }
    else if (dest === "woods") { state.location = "woods"; state.locationName = "Whispering Woods"; log("You head into the Whispering Woods..."); }
    else if (dest === "ruins") {
        if (state.player.level < 3) { log("You need to be at least Level 3 to enter the Ruined Temple."); return; }
        state.location = "ruins"; state.locationName = "Ruined Temple"; log("You enter the eerie Ruined Temple.");
    }
    updateAll();
}

function showMap() { document.getElementById('map-modal').classList.remove('hidden'); document.getElementById('map-modal').classList.add('flex'); }
function hideMap() { document.getElementById('map-modal').classList.remove('flex'); document.getElementById('map-modal').classList.add('hidden'); }

function showInventory() {
    const modal = document.getElementById('inv-modal');
    const list = document.getElementById('inv-list');
    list.innerHTML = '';
    if (state.inventory.length === 0) {
        list.innerHTML = '<div class="p-4 text-center text-zinc-400">Your inventory is empty.</div>';
    }
    state.inventory.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-zinc-800 p-3 rounded-2xl mb-2';
        div.innerHTML = `<div><b>${item.name}</b><div class="text-xs text-zinc-400">${item.desc || ''}</div></div>`;
        const btn = document.createElement('button');
        btn.className = 'px-4 py-1.5 text-xs bg-amber-600 rounded-xl font-bold';
        btn.textContent = item.type === 'consumable' ? 'Use' : 'Equip';
        btn.onclick = () => useItem(index);
        div.appendChild(btn);
        list.appendChild(div);
    });
    modal.classList.remove('hidden'); modal.classList.add('flex');
}

function useItem(index) {
    const item = state.inventory[index];
    const p = state.player;
    if (item.type === 'consumable') {
        if (item.name.includes('Health')) p.hp = Math.min(p.maxHp, p.hp + item.bonus);
        else if (item.name.includes('Mana')) p.mp = Math.min(p.maxMp, p.mp + item.bonus);
        log(`Used ${item.name}.`);
        state.inventory.splice(index, 1);
    } else {
        // Equip weapon or armor
        if (item.name.includes('Sword') || item.name.includes('Blade')) {
            if (p.weapon) state.inventory.push({...p.weapon, type: 'weapon', bonus: p.weapon.bonus});
            p.weapon = {name: item.name, bonus: item.bonus};
        } else {
            if (p.armor) state.inventory.push({...p.armor, type: 'armor', bonus: p.armor.bonus});
            p.armor = {name: item.name, bonus: item.bonus};
        }
        log(`Equipped ${item.name}.`);
        state.inventory.splice(index, 1);
    }
    hideInv();
    updateAll();
    save();
}

function hideInv() {
    document.getElementById('inv-modal').classList.remove('flex');
    document.getElementById('inv-modal').classList.add('hidden');
}

function showStats() {
    const p = state.player;
    const html = `<div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onclick="this.remove()"><div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 p-6 rounded-3xl w-full max-w-[320px] mx-4"><h3 class="text-xl font-bold mb-4 text-center">${p.name}</h3><div class="space-y-2 text-sm"><div>Level <b>${p.level}</b></div><div>XP: ${p.xp} / ${p.level*80+20}</div><div class="pt-2 border-t border-zinc-700"></div><div>STR <b class="text-red-400">${p.str}</b> • INT <b class="text-blue-400">${p.int}</b> • DEF <b class="text-emerald-400">${p.def}</b></div><div class="pt-2 border-t border-zinc-700"></div><div>Weapon: ${p.weapon.name} (+${p.weapon.bonus})</div><div>Armor: ${p.armor.name} (+${p.armor.bonus})</div><div>Spells: ${p.spells.join(', ')}</div></div><button onclick="this.closest('.fixed').remove()" class="mt-6 w-full py-2.5 bg-zinc-800 rounded-2xl">Close</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend', html);
}

function renameCharacter() {
    const name = prompt("What is your name?", state.player.name);
    if (name && name.trim()) {
        state.player.name = name.trim();
        log(`You will now be known as <b>${state.player.name}</b>.`, true);
        updateAll();
        save();
    }
}

function save() {
    localStorage.setItem('spellblade_v2', JSON.stringify(state));
    log("Game saved.");
}

function load() {
    const saved = localStorage.getItem('spellblade_v2');
    if (saved) {
        try { Object.assign(state, JSON.parse(saved)); } catch(e) {}
    }
}

function init() {
    load();
    if (state.story.length === 0) {
        log(`You are <b>${state.player.name}</b>, a young Spellblade.`, true);
        log("Speak with the Elder in the village to begin your adventure.");
    }
    document.getElementById('combat').classList.add('hidden');
    updateAll();
    console.log('%c[Spellblade] Game loaded successfully. All buttons should work now.', 'color:#22c55e');
}

window.onload = init;
</script>
</body>
</html>
