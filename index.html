<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellblade Chronicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .fantasy-title { font-family: Georgia, serif; }
        #enemy-img { transition: opacity 0.2s ease; }
        .stat-card { transition: transform 0.1s ease; }
        .item-row { transition: background-color 0.1s ease; }
        .item-row:hover { background-color: #27251f; }
        .rpg-btn { transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .rpg-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        /* Area portrait styling */
        #area-portrait { transition: all 0.3s ease; }
        #area-portrait img { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="game-container min-h-screen p-4 max-w-[680px] mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="fantasy-title text-3xl text-amber-400">Spellblade Chronicles</h1>
        <div onclick="renameCharacter()" class="text-right cursor-pointer">
            <div id="player-name" class="font-bold text-xl text-amber-300">Aether</div>
            <div class="text-xs text-zinc-400">Level <span id="level">1</span></div>
        </div>
    </div>

    <!-- Stats -->
    <div class="bg-zinc-900 rounded-2xl p-4 mb-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="flex justify-between text-sm">
                    <span><i class="fas fa-heart text-red-500"></i> HP</span>
                    <span id="hp">50/50</span>
                </div>
                <div class="h-2 bg-zinc-800 rounded"><div id="hp-bar" class="h-2 bg-green-500 rounded" style="width:100%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-sm">
                    <span><i class="fas fa-magic text-blue-400"></i> MP</span>
                    <span id="mp">20/20</span>
                </div>
                <div class="h-2 bg-zinc-800 rounded"><div id="mp-bar" class="h-2 bg-blue-500 rounded" style="width:100%"></div></div>
            </div>
        </div>
        <div class="flex justify-between mt-2 text-sm">
            <div>XP <span id="xp" class="font-bold">0/100</span></div>
            <div>Gold <span id="gold" class="font-bold text-yellow-400">20</span></div>
            <div class="text-xs">STR <span id="str">5</span> • INT <span id="int">5</span> • DEF <span id="def">3</span></div>
        </div>
    </div>

    <!-- Story Log -->
    <div class="bg-zinc-900 rounded-2xl mb-4 overflow-hidden">
        <div onclick="toggleStory()" class="px-4 py-2 flex justify-between cursor-pointer bg-zinc-950">
            <span class="font-semibold"><i class="fas fa-book text-amber-400"></i> Story Log</span>
            <i id="story-icon" class="fas fa-chevron-up"></i>
        </div>
        <div id="story-box" class="p-4 max-h-[200px] overflow-auto text-sm"><div id="story"></div></div>
    </div>

    <!-- Location + Controls -->
    <div class="flex justify-between mb-2 px-1">
        <div class="font-bold"><i class="fas fa-map-marker-alt text-emerald-400"></i> <span id="location">Eldoria Village Square</span></div>
        <div class="flex gap-2">
            <button onclick="exportLogs()" class="text-xs px-3 py-1 bg-zinc-800 rounded-full">Logs</button>
            <button onclick="showMap()" class="px-3 py-1 bg-zinc-800 rounded-full text-sm"><i class="fas fa-map"></i> Map</button>
        </div>
    </div>

    <!-- Area Portrait -->
    <div id="area-portrait" class="hidden mb-4">
        <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-700 shadow-inner">
            <img id="area-portrait-img" class="w-full object-cover" alt="Current area" style="display:none; max-height: 220px;">
            <div class="p-3.5 text-sm bg-zinc-950/70" id="area-portrait-caption"></div>
        </div>
    </div>

    <!-- Actions -->
    <div id="actions" class="grid grid-cols-2 gap-3 mb-4"></div>

    <!-- Combat -->
    <div id="combat" class="hidden bg-zinc-900 border border-red-900 rounded-2xl p-4 mb-4">
        <div class="flex gap-4">
            <div class="w-1/2 flex-shrink-0">
                <img id="enemy-img" class="w-full aspect-square object-cover rounded-xl border border-red-800/60" alt="Enemy">
            </div>
            <div class="flex-1 min-w-0">
                <div class="mb-2">
                    <div id="enemy-name" class="font-bold text-red-400 text-lg"></div>
                    <div class="text-xs text-zinc-400">Enemy</div>
                </div>
                <div class="mb-3">
                    <div class="flex justify-between text-sm mb-1">
                        <span>HP</span> <span id="enemy-hp"></span> / <span id="enemy-max"></span>
                    </div>
                    <div class="h-2 bg-zinc-800 rounded"><div id="enemy-hp-bar" class="h-2 bg-red-500 rounded" style="width:100%"></div></div>
                </div>
                <div id="combat-log" class="text-xs bg-zinc-950 p-2 rounded h-20 overflow-auto mb-3"></div>
                <div id="combat-buttons" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Buttons -->
    <div class="flex gap-3">
        <button onclick="showInventory()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">Inventory</button>
        <button onclick="showStats()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">Character</button>
        <button onclick="save()" class="flex-1 py-3 bg-amber-700 hover:bg-amber-600 rounded-2xl text-sm font-medium">Save</button>
    </div>
</div>

<!-- Intro Modal -->
<div id="intro-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-6 hidden">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full p-7 border border-zinc-700">
        <h2 class="fantasy-title text-2xl text-amber-400 mb-4 text-center" id="intro-title"></h2>
        <div id="intro-text" class="space-y-3 text-sm text-zinc-300 mb-6"></div>
        <div class="flex gap-3">
            <button onclick="startGame(true)" class="flex-1 py-3 bg-emerald-700 hover:bg-emerald-600 rounded-2xl font-bold">Begin Adventure</button>
            <button onclick="startGame(false)" class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl">Skip Intro</button>
        </div>
    </div>
</div>

<!-- Map Modal -->
<div id="map-modal" onclick="if(event.target.id==='map-modal') hideMap()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl w-full max-w-[620px] p-5">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-xl">World Map</h3>
            <div>
                <button onclick="zoomMap(-0.2)" class="px-2 py-1 bg-zinc-800 rounded">-</button>
                <span id="zoom-level" class="px-2 text-xs text-zinc-400">100%</span>
                <button onclick="zoomMap(0.2)" class="px-2 py-1 bg-zinc-800 rounded">+</button>
                <button onclick="resetMapZoom(); hideMap()" class="ml-2 px-3 py-1 bg-zinc-700 rounded text-sm">Close</button>
            </div>
        </div>
        <div id="map-content" class="relative w-full h-[420px] bg-zinc-950 rounded-2xl overflow-hidden border border-zinc-700">
            <img src="assets/map/world-map.jpg" class="w-full h-full object-cover" alt="World Map">
            <!-- Clickable locations -->
            <div onclick="travel('village'); hideMap();" class="absolute cursor-pointer" style="bottom:38%; left:28%;">
                <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center ring-2 ring-white/70"><i class="fas fa-home text-white"></i></div>
                <div class="text-center text-[10px] text-emerald-300">Village</div>
            </div>
            <div onclick="travel('woods'); hideMap();" class="absolute cursor-pointer" style="bottom:55%; left:48%;">
                <div class="w-10 h-10 bg-emerald-700 rounded-full flex items-center justify-center ring-2 ring-white/70"><i class="fas fa-tree text-white"></i></div>
                <div class="text-center text-[10px] text-emerald-300">Woods</div>
            </div>
            <div onclick="travel('ruins'); hideMap();" class="absolute cursor-pointer" style="top:32%; right:22%;">
                <div class="w-10 h-10 bg-amber-700 rounded-full flex items-center justify-center ring-2 ring-white/70"><i class="fas fa-archway text-white"></i></div>
                <div class="text-center text-[10px] text-amber-300">Ruins</div>
            </div>
        </div>
    </div>
</div>

<script src="lore.js"></script>
<script src="core.js"></script>
<script src="game.js"></script>

<script>
    window.onload = function() {
        if (typeof init === 'function') init();
        if (typeof initializeGameEnhancements === 'function') {
            setTimeout(initializeGameEnhancements, 400);
        }
    };

    function toggleStory() {
        const box = document.getElementById('story-box');
        const icon = document.getElementById('story-icon');
        if (!box || !icon) return;
        if (box.style.display === 'none') {
            box.style.display = 'block';
            icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
        } else {
            box.style.display = 'none';
            icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
        }
    }
</script>
</body>
</html>
