<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellblade Chronicles</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .fantasy-title { font-family: Georgia, serif; }
    #enemy-img { transition: opacity 0.2s ease; }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="game-container min-h-screen p-4 max-w-[680px] mx-auto">
    <div class="flex justify-between items-center mb-4">
        <h1 class="fantasy-title text-3xl text-amber-400">Spellblade Chronicles</h1>
        <div onclick="renameCharacter()" class="text-right cursor-pointer">
            <div id="player-name" class="font-bold text-xl text-amber-300">Aether</div>
            <div class="text-xs text-zinc-400">Level <span id="level">1</span></div>
        </div>
    </div>

    <div class="bg-zinc-900 rounded-2xl p-4 mb-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-heart text-red-500"></i> HP</span> <span id="hp">50/50</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="hp-bar" class="h-2 bg-green-500 rounded" style="width:100%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-magic text-blue-400"></i> MP</span> <span id="mp">20/20</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="mp-bar" class="h-2 bg-blue-500 rounded" style="width:100%"></div></div>
            </div>
        </div>
        <div class="flex justify-between mt-2 text-sm">
            <div>XP <span id="xp" class="font-bold">0/100</span></div>
            <div>Gold <span id="gold" class="font-bold text-yellow-400">20</span></div>
            <div class="text-xs">STR <span id="str">5</span> • INT <span id="int">5</span> • DEF <span id="def">3</span></div>
        </div>
    </div>

    <div class="bg-zinc-900 rounded-2xl mb-4 overflow-hidden">
        <div onclick="toggleStory()" class="px-4 py-2 flex justify-between cursor-pointer bg-zinc-950">
            <span class="font-semibold"><i class="fas fa-book text-amber-400"></i> Story Log</span>
            <i id="story-icon" class="fas fa-chevron-up"></i>
        </div>
        <div id="story-box" class="p-4 max-h-[200px] overflow-auto text-sm"><div id="story"></div></div>
    </div>

    <div class="flex justify-between mb-2 px-1">
        <div class="font-bold"><i class="fas fa-map-marker-alt text-emerald-400"></i> <span id="location">Eldoria Village Square</span></div>
        <div class="flex gap-2">
            <button onclick="exportLogs()" class="text-xs px-3 py-1 bg-zinc-800 rounded-full">Logs</button>
            <button onclick="showMap()" class="px-3 py-1 bg-zinc-800 rounded-full text-sm"><i class="fas fa-map"></i> Map</button>
        </div>
    </div>

    <div id="actions" class="grid grid-cols-2 gap-3 mb-4"></div>

    <div id="combat" class="hidden bg-zinc-900 border border-red-900 rounded-2xl p-4 mb-4">
        <div class="mb-3">
            <img id="enemy-img" class="w-full h-44 object-cover rounded-xl border border-red-800/60" alt="Enemy creature" style="display: none;">
        </div>
        <div class="flex justify-between text-sm mb-2">
            <div><span id="enemy-name" class="font-bold text-red-400"></span></div>
            <div class="text-xs">HP <span id="enemy-hp"></span>/<span id="enemy-max"></span></div>
        </div>
        <div id="combat-log" class="bg-black/60 p-2 rounded text-xs h-16 overflow-auto mb-3"></div>
        <div class="grid grid-cols-2 gap-2 text-sm" id="combat-buttons">
            <button onclick="swordAttack()" class="bg-red-600 py-2 rounded-xl">Sword Attack</button>
            <button onclick="castSpell()" class="bg-blue-600 py-2 rounded-xl" id="spell-btn">Cast Spell (Firebolt)</button>
            <button onclick="castHeal()" class="bg-emerald-600 py-2 rounded-xl hidden" id="heal-btn">Cast Heal</button>
            <button onclick="defend()" class="bg-zinc-700 py-2 rounded-xl">Defend</button>
            <button onclick="flee()" class="bg-zinc-700 py-2 rounded-xl">Flee</button>
        </div>
    </div>

    <div class="flex gap-2 justify-center">
        <button onclick="showInventory()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Inventory</button>
        <button onclick="showStats()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Character</button>
        <button onclick="save()" class="px-4 py-2 bg-emerald-800 rounded-xl text-sm">Save</button>
    </div>
</div>

<script src="lore.js"></script>
<script>
let state = {
    player: {name:"Aether",level:1,hp:50,maxHp:50,mp:20,maxMp:20,xp:0,gold:20,str:5,int:5,def:3,weapon:{name:"Rusty Sword",bonus:3},armor:{name:"Cloth Tunic",bonus:1},spells:["Firebolt"]},
    inventory: [{id:1,name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP",flavor:"A simple red potion.", quantity: 2}],
    location:"village",locationName:"Eldoria Village Square",
    quest:0,kills:0,inCombat:false,enemy:null,story:[],lastLootTime:0, ruinsStage: 0
};
let storyOpen = true;

function log(msg, important = false) {
    state.story.push({msg, important});
    if (state.story.length > 15) state.story.shift();
    renderStory();
}

function renderStory() {
    const el = document.getElementById('story');
    el.innerHTML = '';
    state.story.slice(-9).forEach(s => {
        const p = document.createElement('p');
        p.className = `mb-1.5 text-sm ${s.important ? 'text-amber-300 font-medium' : 'text-zinc-300'}`;
        p.innerHTML = s.msg;
        el.appendChild(p);
    });
}

function updateStats() {
    const p = state.player;
    document.getElementById('player-name').textContent = p.name;
    document.getElementById('level').textContent = p.level;
    document.getElementById('hp').textContent = `${p.hp}/${p.maxHp}`;
    document.getElementById('mp').textContent = `${p.mp}/${p.maxMp}`;
    document.getElementById('xp').textContent = `${p.xp}/${p.level * 80 + 20}`;
    document.getElementById('gold').textContent = p.gold;
    document.getElementById('str').textContent = p.str;
    document.getElementById('int').textContent = p.int;
    document.getElementById('def').textContent = p.def;
    document.getElementById('hp-bar').style.width = Math.max(0, (p.hp / p.maxHp) * 100) + '%';
    document.getElementById('mp-bar').style.width = Math.max(0, (p.mp / p.maxMp) * 100) + '%';
    document.getElementById('location').textContent = state.locationName;
}

function toggleStory() {
    const box = document.getElementById('story-box');
    storyOpen = !storyOpen;
    box.style.display = storyOpen ? '' : 'none';
    document.getElementById('story-icon').className = storyOpen ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
}

function renderActions() {
    const c = document.getElementById('actions');
    c.innerHTML = '';
    if (state.inCombat) { 
        document.getElementById('combat').classList.remove('hidden'); 
        updateCombatButtons();
        return; 
    }
    document.getElementById('combat').classList.add('hidden');
    let html = '';
    const loc = state.location;
    if (loc === 'village') {
        html += `<button onclick="talkElder()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-user-tie text-amber-400"></i><span>Talk to Elder</span></button>`;
        html += `<button onclick="openShop()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-store text-emerald-400"></i><span>Visit Merchant</span></button>`;
        html += `<button onclick="restInn()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-bed text-blue-400"></i><span>Rest at Inn</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`;
    } else if (loc === 'woods') {
        html += `<button onclick="startFight()" class="rpg-btn bg-red-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-skull"></i><span>Look for Combat</span></button>`;
        html += `<button onclick="searchLoot()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-search text-amber-400"></i><span>Search for Loot</span></button>`;
        html += `<button onclick="travel('village')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-home text-emerald-400"></i><span>Return to Village</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`;
    } else if (loc === 'ruins') {
        html += `<button onclick="searchTempleHall()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-search"></i><span>Search the Hall</span></button>`;
        html += `<button onclick="descendDeeper()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-arrow-down"></i><span>Descend Deeper</span></button>`;
        html += `<button onclick="investigateAltar()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-gem"></i><span>Investigate Altar</span></button>`;
        html += `<button onclick="travel('woods')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-arrow-left text-emerald-400"></i><span>Back to Woods</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`;
    }
    c.innerHTML = html;
}

function updateCombatButtons() {
    const healBtn = document.getElementById('heal-btn');
    if (healBtn) {
        healBtn.classList.toggle('hidden', !state.player.spells.includes('Heal'));
    }
}

function updateAll() { updateStats(); renderActions(); renderStory(); }

function showIntro() {
    // Intro modal code simplified for fix
    alert("Welcome back to Spellblade Chronicles! (Intro skipped due to restore)");
}

function startGame(withIntro) {
    // Simplified
}

function talkElder() {
    const elder = Lore.elder || {stage0: ["Elder: The wards are failing."], default: ["Elder: Return when you have slain more creatures."]};
    if (state.quest === 0) {
        (elder.stage0 || []).forEach(line => log(line, true));
        state.quest = 1;
    } else if (state.quest === 1 && state.kills >= 3) {
        log("Elder: You have done well. Take this gold.", true);
        state.player.gold += 40;
        state.quest = 2;
    } else {
        log((elder.default || ["Elder: Return when ready."])[0]);
    }
    updateAll(); save();
}

function openShop() {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/70 flex items-end justify-center z-50';
    modal.innerHTML = `
        <div class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
            <div class="flex justify-between mb-4"><h3 class="font-bold">Merchant's Shop</h3><button onclick="this.closest('.fixed').remove()" class="text-xl">&times;</button></div>
            <div id="shop-list" class="space-y-3"></div>
        </div>`;
    document.body.appendChild(modal);
    const list = modal.querySelector('#shop-list');
    const items = [
        {name:"Iron Sword",type:"weapon",bonus:7,price:55,effect:"+7 Damage"},
        {name:"Leather Armor",type:"armor",bonus:4,price:45,effect:"+4 Defense"},
        {name:"Health Potion",type:"consumable",bonus:30,price:12,effect:"Restores 30 HP"},
        {name:"Mana Potion",type:"consumable",bonus:15,price:15,effect:"Restores 15 MP"},
        {name:"Spell Tome: Heal",type:"spell",bonus:0,price:80,effect:"Learn Heal spell"}
    ];
    items.forEach(item => {
        const can = state.player.gold >= item.price;
        const d = document.createElement('div');
        d.className = `p-3 rounded-2xl flex justify-between ${can ? 'bg-zinc-800' : 'bg-zinc-950 opacity-60'}`;
        d.innerHTML = `<div><b>${item.name}</b><div class="text-xs text-zinc-400">${item.effect}</div></div><div class="text-emerald-400 font-bold">${item.price}g</div>`;
        if (can) d.onclick = () => { buyFromShop(item); modal.remove(); };
        list.appendChild(d);
    });
}

function buyFromShop(item) {
    if (state.player.gold < item.price) return;
    state.player.gold -= item.price;
    if (item.type === "weapon") {
        if (state.player.weapon && state.player.weapon.name !== "Rusty Sword") {
            addToInventory({name: state.player.weapon.name, type: "weapon", bonus: state.player.weapon.bonus, desc: "Old weapon"});
        }
        state.player.weapon = {name: item.name, bonus: item.bonus};
    } else if (item.type === "armor") {
        if (state.player.armor && state.player.armor.name !== "Cloth Tunic") {
            addToInventory({name: state.player.armor.name, type: "armor", bonus: state.player.armor.bonus, desc: "Old armor"});
        }
        state.player.armor = {name: item.name, bonus: item.bonus};
    } else if (item.type === "spell") {
        if (!state.player.spells.includes("Heal")) state.player.spells.push("Heal");
    } else {
        addToInventory({name: item.name, type: "consumable", bonus: item.bonus, desc: item.effect, quantity: 1});
    }
    log(`You obtained <b>${item.name}</b>.`);
    updateAll(); save();
}

function addToInventory(newItem) {
    if (newItem.type === 'consumable') {
        const existing = state.inventory.findIndex(i => i.name === newItem.name);
        if (existing !== -1) {
            state.inventory[existing].quantity = (state.inventory[existing].quantity || 1) + (newItem.quantity || 1);
            return;
        }
    }
    newItem.id = Date.now();
    if (newItem.type === 'consumable' && !newItem.quantity) newItem.quantity = 1;
    state.inventory.push(newItem);
}

function restInn() {
    if (state.player.gold < 8) return log("Not enough gold.");
    state.player.gold -= 8;
    state.player.hp = state.player.maxHp;
    state.player.mp = state.player.maxMp;
    log("You rest at the inn and recover.", true);
    updateAll(); save();
}

function setEnemyImage(enemyName) {
    const img = document.getElementById('enemy-img');
    if (!img) return;
    let src = '';
    const n = (enemyName || '').toLowerCase();
    if (n.includes('goblin')) src = 'assets/creatures/goblin-scout.jpg';
    else if (n.includes('skeleton') || n.includes('guardian')) src = 'assets/creatures/skeleton-warrior.jpg'; // fallback or temple-guardian
    else if (n.includes('wolf') || n.includes('stalker')) src = 'assets/creatures/forest-wolf.jpg';
    else if (n.includes('fallen') || n.includes('spellblade')) src = 'assets/creatures/fallen-spellblade.jpg';
    else src = 'assets/creatures/forest-wolf.jpg';
    if (src) {
        img.src = src;
        img.style.display = 'block';
        img.onerror = () => img.style.display = 'none';
    }
}

function startFight() {
    const pool = [
        {name:"Goblin Scout",hp:22,maxHp:22,atk:7,def:2,xp:18,gold:6},
        {name:"Forest Wolf",hp:32,maxHp:32,atk:8,def:3,xp:26,gold:9}
    ];
    state.enemy = pool[Math.floor(Math.random()*pool.length)];
    state.inCombat = true;
    document.getElementById('combat-log').innerHTML = '';
    setEnemyImage(state.enemy.name);
    addCombatLog(`A <b>${state.enemy.name}</b> emerges!`);
    updateCombatUI();
    renderActions();
}

function searchLoot() {
    if (Date.now() - state.lastLootTime < 45000) return log("Wait before searching again.");
    state.lastLootTime = Date.now();
    if (Math.random() < 0.22) {
        log("Your search attracted something dangerous...");
        setTimeout(() => {
            state.enemy = {name:"Corrupted Wolf",hp:20,maxHp:20,atk:6,def:2,xp:15,gold:5};
            state.inCombat = true;
            document.getElementById('combat-log').innerHTML = '';
            setEnemyImage(state.enemy.name);
            addCombatLog("A corrupted beast lunges at you!");
            updateCombatUI();
            renderActions();
        }, 400);
        return;
    }
    if (Math.random() < 0.6) {
        const g = 6 + Math.floor(Math.random()*8);
        state.player.gold += g;
        log(`You found <b>${g} Gold</b>.`, true);
    } else {
        log("Your search turned up nothing.");
    }
    updateAll();
}

function searchTempleHall() {
    log("You search the ruined hall...");
    setTimeout(() => {
        if (Math.random() < 0.4) {
            state.enemy = {name:"Temple Guardian",hp:55,maxHp:55,atk:8,def:7,xp:40,gold:20};
            state.inCombat = true;
            document.getElementById('combat-log').innerHTML = '';
            setEnemyImage(state.enemy.name);
            addCombatLog("A Temple Guardian awakens!");
            updateCombatUI();
            renderActions();
        } else {
            state.player.gold += 30;
            addToInventory({name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP",quantity:1});
            log("You found gold and a potion.", true);
            updateAll();
        }
    }, 500);
}

function descendDeeper() {
    log("You descend into the lower levels...");
    setTimeout(() => {
        if (Math.random() < 0.55) {
            state.enemy = {name:"Shadow Stalker",hp:28,maxHp:28,atk:11,def:2,xp:38,gold:15};
            state.inCombat = true;
            document.getElementById('combat-log').innerHTML = '';
            setEnemyImage(state.enemy.name);
            addCombatLog("A Shadow Stalker ambushes you!");
            updateCombatUI();
            renderActions();
        } else {
            state.player.gold += 45;
            addToInventory({name:"Mana Potion",type:"consumable",bonus:15,desc:"Restores 15 MP",quantity:1});
            log("You found gold and a Mana Potion in the depths.", true);
            updateAll();
        }
    }, 600);
}

function investigateAltar() {
    log("You approach the ancient altar...");
    setTimeout(() => {
        if (Math.random() < 0.45) {
            state.enemy = {name:"Fallen Spellblade",hp:65,maxHp:65,atk:10,def:5,xp:55,gold:30};
            state.inCombat = true;
            document.getElementById('combat-log').innerHTML = '';
            setEnemyImage(state.enemy.name);
            addCombatLog("The Fallen Spellblade rises!");
            updateCombatUI();
            renderActions();
        } else {
            state.player.int += 1;
            log("You gain insight from the altar (+1 INT).", true);
            updateAll();
        }
    }, 550);
}

function addCombatLog(msg) {
    const el = document.getElementById('combat-log');
    if (!el) return;
    const d = document.createElement('div');
    d.innerHTML = msg;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
}

function updateCombatUI() {
    if (!state.enemy) return;
    const e = state.enemy;
    document.getElementById('enemy-name').innerHTML = e.name;
    document.getElementById('enemy-hp').innerHTML = e.hp;
    document.getElementById('enemy-max').innerHTML = e.maxHp;
    updateStats();
    updateCombatButtons();
}

function swordAttack() {
    if (!state.inCombat || !state.enemy) return;
    const e = state.enemy; const p = state.player;
    let dmg = Math.max(3, Math.floor(5 + p.str + (p.weapon.bonus||0) - e.def + Math.random()*3));
    e.hp -= dmg;
    addCombatLog(`You strike for <span class="text-red-400">${dmg}</span> damage.`);
    if (e.hp <= 0) return endCombatWin();
    let edmg = Math.max(1, Math.floor(e.atk - p.def + Math.random()*2));
    p.hp -= edmg;
    addCombatLog(`${e.name} hits you for ${edmg}.`);
    if (p.hp <= 0) { log("You have fallen...", true); setTimeout(() => {p.hp = Math.floor(p.maxHp*0.4); state.location='village'; endCombat();}, 1000); }
    updateCombatUI();
}

function castSpell() {
    if (!state.inCombat || !state.enemy) return;
    const p = state.player; const e = state.enemy;
    if (p.mp < 8) return addCombatLog("Not enough mana!");
    p.mp -= 8;
    let dmg = Math.floor(10 + p.int * 1.4);
    e.hp -= dmg;
    addCombatLog(`Firebolt hits for <span class="text-blue-400">${dmg}</span>!`);
    if (e.hp <= 0) return endCombatWin();
    let edmg = Math.max(1, Math.floor(e.atk - p.def));
    p.hp -= edmg;
    addCombatLog(`${e.name} strikes back.`);
    if (p.hp <= 0) { log("You have fallen...", true); setTimeout(() => {p.hp = Math.floor(p.maxHp*0.4); state.location='village'; endCombat();}, 1000); }
    updateCombatUI();
}

function castHeal() {
    if (!state.inCombat) return;
    const p = state.player;
    if (p.mp < 10) return addCombatLog("Not enough mana!");
    p.mp -= 10;
    const heal = Math.floor(18 + p.int * 1.2);
    p.hp = Math.min(p.maxHp, p.hp + heal);
    addCombatLog(`You cast Heal and recover <span class="text-emerald-400">${heal}</span> HP.`);
    if (state.enemy && Math.random() < 0.5) {
        let edmg = Math.max(1, Math.floor(state.enemy.atk * 0.6));
        p.hp -= edmg;
        addCombatLog(`${state.enemy.name} counters for ${edmg}.`);
    }
    updateCombatUI();
}

function defend() {
    if (!state.inCombat || !state.enemy) return;
    let dmg = Math.max(1, Math.floor(state.enemy.atk * 0.55));
    state.player.hp -= dmg;
    addCombatLog(`You defend and take ${dmg} damage.`);
    if (state.player.hp <= 0) { log("You have fallen.", true); setTimeout(() => {state.player.hp = Math.floor(state.player.maxHp*0.4); state.location='village'; endCombat();}, 1000); }
    updateCombatUI();
}

function flee() {
    if (Math.random() < 0.5) { log("You escaped!"); endCombat(); }
    else addCombatLog("Couldn't get away!");
}

function endCombatWin() {
    const e = state.enemy; const p = state.player;
    p.gold += e.gold || 10;
    p.xp += e.xp || 20;
    state.kills++;
    addCombatLog(`<b class="text-emerald-400">Victory!</b>`);
    log(`You defeated the ${e.name}.`, true);
    if (Math.random() < 0.4) addToInventory({name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP",quantity:1});
    if (state.kills === 4 && !p.spells.includes("Heal")) {
        p.spells.push("Heal");
        log("You learned <b>Heal</b>!", true);
    }
    if (p.xp >= p.level * 80 + 20) {
        p.level++; p.xp=0; p.maxHp+=8; p.hp=p.maxHp; p.str++; p.int++; p.def++;
        log(`<b>LEVEL UP!</b> You are now Level ${p.level}!`, true);
    }
    endCombat();
}

function endCombat() {
    state.inCombat = false;
    state.enemy = null;
    const img = document.getElementById('enemy-img');
    if (img) img.style.display = 'none';
    document.getElementById('combat').classList.add('hidden');
    renderActions();
    updateAll();
    save();
}

function travel(dest) {
    if (dest === 'village') { state.location = 'village'; state.locationName = 'Eldoria Village Square'; }
    else if (dest === 'woods') { state.location = 'woods'; state.locationName = 'Whispering Woods'; }
    else if (dest === 'ruins') { if (state.player.level < 3) return log("Level 3+ required."); state.location = 'ruins'; state.locationName = 'Ruined Temple'; }
    updateAll();
}

function showMap() {
    const m = document.createElement('div');
    m.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50';
    m.innerHTML = `<div class="bg-zinc-900 p-5 rounded-2xl max-w-[380px]"><h3 class="font-bold mb-3">World Map</h3><div class="space-y-2"><button onclick="travel('village');this.closest('.fixed').remove()" class="w-full p-2 bg-emerald-700 rounded">Village</button><button onclick="travel('woods');this.closest('.fixed').remove()" class="w-full p-2 bg-orange-700 rounded">Woods</button><button onclick="travel('ruins');this.closest('.fixed').remove()" class="w-full p-2 bg-purple-700 rounded">Ruins (Lv3+)</button></div></div>`;
    document.body.appendChild(m);
}

function showInventory() {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/70 flex items-end justify-center z-50';
    let html = `<div class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5"><div class="flex justify-between mb-3"><h3 class="font-bold">Inventory</h3><button onclick="this.closest('.fixed').remove()" class="text-xl">&times;</button></div><div class="space-y-2">`;
    if (state.inventory.length === 0) html += '<div class="p-4 text-center text-zinc-400">Empty</div>';
    state.inventory.forEach((item, i) => {
        const qty = item.quantity || 1;
        html += `<div class="flex justify-between bg-zinc-800 p-3 rounded-2xl"><div><b>${item.name}</b> ${qty>1 ? 'x'+qty : ''}<div class="text-xs text-zinc-400">${item.desc||''}</div></div><div class="flex gap-1"><button onclick="useItem(${i});this.closest('.fixed').remove()" class="px-3 py-1 text-xs bg-amber-600 rounded-xl">${item.type==='consumable'?'Use':'Equip'}</button></div></div>`;
    });
    html += `</div></div>`;
    modal.innerHTML = html;
    document.body.appendChild(modal);
}

function useItem(i) {
    const item = state.inventory[i]; const p = state.player;
    if (item.type === 'consumable') {
        if (item.name.includes('Health')) p.hp = Math.min(p.maxHp, p.hp + item.bonus);
        if (item.name.includes('Mana')) p.mp = Math.min(p.maxMp, p.mp + item.bonus);
        log(`Used ${item.name}.`);
        if ((item.quantity||1) > 1) item.quantity--; else state.inventory.splice(i,1);
    } else {
        if (item.type === 'weapon' || item.name.toLowerCase().includes('sword')) {
            if (p.weapon && p.weapon.name !== "Rusty Sword") addToInventory(p.weapon);
            p.weapon = {name:item.name, bonus:item.bonus};
        } else {
            if (p.armor && p.armor.name !== "Cloth Tunic") addToInventory(p.armor);
            p.armor = {name:item.name, bonus:item.bonus};
        }
        log(`Equipped ${item.name}.`);
        state.inventory.splice(i,1);
    }
    updateAll(); save();
}

function showStats() {
    const p = state.player;
    const div = document.createElement('div');
    div.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
    div.innerHTML = `<div class="bg-zinc-900 p-6 rounded-3xl max-w-xs mx-4"><h3 class="font-bold text-center mb-3">${p.name}</h3><div class="text-sm space-y-1"><div>Level ${p.level}</div><div>STR ${p.str} • INT ${p.int} • DEF ${p.def}</div><div>Weapon: ${p.weapon.name}</div><div>Armor: ${p.armor.name}</div><div>Spells: ${p.spells.join(', ')}</div></div><button onclick="this.closest('.fixed').remove()" class="mt-4 w-full py-2 bg-zinc-800 rounded-2xl">Close</button></div>`;
    document.body.appendChild(div);
}

function renameCharacter() {
    const n = prompt("Name:", state.player.name);
    if (n) { state.player.name = n; updateAll(); }
}

function save() { localStorage.setItem('spellblade_v3', JSON.stringify(state)); }

function load() {
    const s = localStorage.getItem('spellblade_v3');
    if (s) { try { Object.assign(state, JSON.parse(s)); } catch(e){} }
}

function init() {
    load();
    document.getElementById('combat').classList.add('hidden');
    updateAll();
    // Auto show simple message if broken before
    if (!state.player) state.player = {name:"Aether",level:1,hp:50,maxHp:50,mp:20,maxMp:20,xp:0,gold:20,str:5,int:5,def:3,weapon:{name:"Rusty Sword",bonus:3},armor:{name:"Cloth Tunic",bonus:1},spells:["Firebolt"]};
}
window.onload = init;
</script>
</body>
</html>
