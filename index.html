<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellblade Chronicles</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .fantasy-title { font-family: Georgia, serif; }
    .game-container { max-width: 680px; margin: 0 auto; }
    .rpg-btn { transition: all 0.1s ease; }
    .map-zone { transition: all 0.2s ease; }
    .map-zone:hover { transform: scale(1.05); }
    .map-container {
        background: linear-gradient(#16653422, #052e16);
        border: 3px solid #4ade80;
        box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="game-container min-h-screen p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="fantasy-title text-3xl text-amber-400">Spellblade Chronicles</h1>
        <div onclick="renameCharacter()" class="text-right cursor-pointer">
            <div id="player-name" class="font-bold text-xl text-amber-300">Aether</div>
            <div class="text-xs text-zinc-400">Level <span id="level">1</span></div>
        </div>
    </div>

    <!-- Stats -->
    <div class="bg-zinc-900 rounded-2xl p-4 mb-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-heart text-red-500"></i> HP</span> <span id="hp">50/50</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="hp-bar" class="h-2 bg-green-500 rounded" style="width:100%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-magic text-blue-400"></i> MP</span> <span id="mp">20/20</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="mp-bar" class="h-2 bg-blue-500 rounded" style="width:100%"></div></div>
            </div>
        </div>
        <div class="flex justify-between mt-2 text-sm">
            <div>XP <span id="xp" class="font-bold">0/100</span></div>
            <div>Gold <span id="gold" class="font-bold text-yellow-400">20</span></div>
            <div class="text-xs">STR <span id="str">5</span> INT <span id="int">5</span> DEF <span id="def">3</span></div>
        </div>
    </div>

    <!-- Story -->
    <div class="bg-zinc-900 rounded-2xl mb-4 overflow-hidden">
        <div onclick="toggleStory()" class="px-4 py-2 flex justify-between cursor-pointer bg-zinc-950">
            <span class="font-semibold"><i class="fas fa-book text-amber-400"></i> Story Log</span>
            <i id="story-icon" class="fas fa-chevron-up"></i>
        </div>
        <div id="story-box" class="p-4 max-h-[200px] overflow-auto text-sm"><div id="story"></div></div>
    </div>

    <div class="flex justify-between mb-2 px-1">
        <div class="font-bold"><i class="fas fa-map-marker-alt text-emerald-400"></i> <span id="location">Eldoria Village Square</span></div>
        <div class="flex gap-2">
            <button onclick="exportLogs()" class="text-xs px-3 py-1 bg-zinc-800 rounded-full">Logs</button>
            <button onclick="showMap()" class="px-3 py-1 bg-zinc-800 rounded-full text-sm"><i class="fas fa-map"></i> Map</button>
        </div>
    </div>

    <div id="actions" class="grid grid-cols-2 gap-3 mb-4"></div>

    <!-- Combat -->
    <div id="combat" class="hidden bg-zinc-900 border border-red-900 rounded-2xl p-4 mb-4">
        <div class="flex justify-between text-sm mb-2">
            <div><span id="enemy-name" class="font-bold text-red-400"></span> <span class="text-xs">(<span id="enemy-hp"></span>/<span id="enemy-max"></span> HP)</span></div>
            <div class="text-xs">ATK <span id="enemy-atk" class="font-bold"></span></div>
        </div>
        <div id="combat-log" class="bg-black/60 p-2 rounded text-xs h-16 overflow-auto mb-3"></div>
        <div class="grid grid-cols-2 gap-2 text-sm">
            <button onclick="swordAttack()" class="bg-red-600 py-2 rounded-xl">Sword</button>
            <button onclick="castSpell()" class="bg-blue-600 py-2 rounded-xl" id="spell-btn">Spell</button>
            <button onclick="defend()" class="bg-zinc-700 py-2 rounded-xl">Defend</button>
            <button onclick="flee()" class="bg-zinc-700 py-2 rounded-xl">Flee</button>
        </div>
    </div>

    <div class="flex gap-2 justify-center">
        <button onclick="showInventory()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Inventory</button>
        <button onclick="showStats()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Stats</button>
        <button onclick="save()" class="px-4 py-2 bg-emerald-800 rounded-xl text-sm">Save</button>
    </div>
</div>

<!-- === NEW VISUAL WORLD MAP === -->
<div id="map-modal" onclick="if(event.target.id==='map-modal') hideMap()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl w-full max-w-[380px] p-5 border border-zinc-700">
        
        <!-- Map Header -->
        <div class="flex justify-between items-center mb-4">
            <div>
                <h3 class="font-bold text-xl">World Map</h3>
                <p class="text-xs text-zinc-400">Eldoria Region</p>
            </div>
            <button onclick="hideMap()" class="text-2xl text-zinc-400">&times;</button>
        </div>

        <!-- Visual Map Area -->
        <div class="map-container relative rounded-2xl p-6 h-[340px] overflow-hidden" style="background: linear-gradient(#14532d, #052e16);">
            
            <!-- Decorative elements -->
            <div class="absolute top-4 right-6 text-emerald-900/40 text-6xl"><i class="fas fa-mountain"></i></div>
            <div class="absolute bottom-8 left-8 text-emerald-900/30 text-5xl"><i class="fas fa-tree"></i></div>

            <!-- Village Zone (Bottom Left) -->
            <div onclick="travel('village')" class="map-zone absolute bottom-8 left-6 flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 flex items-center justify-center bg-emerald-600 rounded-full shadow-lg ${state?.location === 'village' ? 'ring-4 ring-white' : ''}">
                    <i class="fas fa-home text-white text-3xl"></i>
                </div>
                <div class="mt-1 text-center">
                    <div class="text-xs font-bold text-emerald-300">ELDORIA</div>
                    <div class="text-[10px] text-emerald-400">Village</div>
                </div>
            </div>

            <!-- Woods Zone (Center) -->
            <div onclick="travel('woods')" class="map-zone absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center cursor-pointer">
                <div class="w-16 h-16 flex items-center justify-center bg-orange-600 rounded-full shadow-lg ${state?.location === 'woods' ? 'ring-4 ring-white' : ''}">
                    <i class="fas fa-tree text-white text-4xl"></i>
                </div>
                <div class="mt-1 text-center">
                    <div class="text-xs font-bold text-orange-300">WHISPERING</div>
                    <div class="text-[10px] text-orange-400">Woods</div>
                </div>
            </div>

            <!-- Ruins Zone (Top Right) -->
            <div onclick="travel('ruins')" class="map-zone absolute top-8 right-6 flex flex-col items-center cursor-pointer">
                <div class="w-14 h-14 flex items-center justify-center bg-purple-600 rounded-full shadow-lg ${state?.location === 'ruins' ? 'ring-4 ring-white' : ''}">
                    <i class="fas fa-archway text-white text-3xl"></i>
                </div>
                <div class="mt-1 text-center">
                    <div class="text-xs font-bold text-purple-300">RUINED</div>
                    <div class="text-[10px] text-purple-400">Temple</div>
                </div>
            </div>

            <!-- You are here marker -->
            <div id="you-are-here" class="absolute hidden">
                <div class="flex items-center gap-1 text-emerald-400 text-xs">
                    <i class="fas fa-map-marker-alt"></i>
                    <span class="font-bold">You are here</span>
                </div>
            </div>

        </div>

        <div class="mt-4 text-center">
            <p class="text-xs text-zinc-400">Tap an icon to travel</p>
        </div>
    </div>
</div>

<!-- Shop -->
<div id="shop-modal" onclick="if(event.target.id==='shop-modal') hideShop()" class="hidden fixed inset-0 bg-black/70 flex items-end justify-center">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
        <div class="flex justify-between mb-4"><h3 class="font-bold text-lg">Merchant's Shop</h3><button onclick="hideShop()" class="text-xl">&times;</button></div>
        <div id="shop-list" class="space-y-3"></div>
    </div>
</div>

<!-- Inventory -->
<div id="inv-modal" onclick="if(event.target.id==='inv-modal') hideInv()" class="hidden fixed inset-0 bg-black/70 flex items-end justify-center">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
        <div class="flex justify-between mb-3"><h3 class="font-bold">Inventory</h3><button onclick="hideInv()" class="text-xl">&times;</button></div>
        <div id="inv-list" class="space-y-2"></div>
    </div>
</div>

<!-- Item Detail -->
<div id="item-detail-modal" onclick="if(event.target.id==='item-detail-modal') hideItemDetail()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-sm mx-4 rounded-3xl p-6">
        <div class="flex justify-between mb-3"><h3 id="item-detail-name" class="font-bold"></h3><button onclick="hideItemDetail()" class="text-xl">&times;</button></div>
        <div id="item-detail-body" class="text-sm"></div>
    </div>
</div>

<script>
let state = {
    player: {name:"Aether",level:1,hp:50,maxHp:50,mp:20,maxMp:20,xp:0,gold:20,str:5,int:5,def:3,
        weapon:{name:"Rusty Sword",bonus:3}, armor:{name:"Cloth Tunic",bonus:1}, spells:["Firebolt"]},
    inventory: [{id:1,name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP",flavor:"A simple healing potion."}],
    location:"village", locationName:"Eldoria Village Square",
    quest:0, kills:0, inCombat:false, enemy:null, story:[], lastLootTime:0
};

let storyOpen = true;

function log(msg, important=false){ state.story.push({msg,important}); if(state.story.length>14) state.story.shift(); renderStory(); }
function renderStory(){ const el=document.getElementById('story'); el.innerHTML=''; state.story.slice(-8).forEach(s=>{const p=document.createElement('p');p.className=`mb-1 text-sm ${s.important?'text-amber-300':''}`;p.innerHTML=s.msg;el.appendChild(p);}); }
function updateStats(){ const p=state.player; document.getElementById('player-name').textContent=p.name; document.getElementById('level').textContent=p.level; document.getElementById('hp').textContent=`${p.hp}/${p.maxHp}`; document.getElementById('mp').textContent=`${p.mp}/${p.maxMp}`; document.getElementById('xp').textContent=`${p.xp}/${p.level*80+20}`; document.getElementById('gold').textContent=p.gold; document.getElementById('str').textContent=p.str; document.getElementById('int').textContent=p.int; document.getElementById('def').textContent=p.def; document.getElementById('hp-bar').style.width=Math.max(0,(p.hp/p.maxHp)*100)+'%'; document.getElementById('mp-bar').style.width=Math.max(0,(p.mp/p.maxMp)*100)+'%'; document.getElementById('location').textContent=state.locationName; }
function toggleStory(){ const box=document.getElementById('story-box'); storyOpen=!storyOpen; box.style.display=storyOpen?'':'none'; document.getElementById('story-icon').className=storyOpen?'fas fa-chevron-up':'fas fa-chevron-down'; }

function renderActions(){ const c=document.getElementById('actions'); c.innerHTML=''; if(state.inCombat){document.getElementById('combat').classList.remove('hidden');return;} document.getElementById('combat').classList.add('hidden'); let html=''; const loc=state.location; if(loc==='village'){ html+=`<button onclick="talkElder()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-user-tie text-amber-400"></i><span>Talk to Elder</span></button>`; html+=`<button onclick="openShop()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-store text-emerald-400"></i><span>Visit Merchant</span></button>`; html+=`<button onclick="restInn()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-bed text-blue-400"></i><span>Rest at Inn</span></button>`; html+=`<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`; } else if(loc==='woods'){ html+=`<button onclick="startFight()" class="rpg-btn bg-red-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-skull"></i><span>Look for Combat</span></button>`; html+=`<button onclick="searchLoot()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-search text-amber-400"></i><span>Search for Loot</span></button>`; html+=`<button onclick="travel('village')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-home text-emerald-400"></i><span>Return to Village</span></button>`; html+=`<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`; } else if(loc==='ruins'){ html+=`<button onclick="exploreRuins()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-archway"></i><span>Explore Temple</span></button>`; html+=`<button onclick="travel('woods')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-arrow-left text-emerald-400"></i><span>Back to Woods</span></button>`; html+=`<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`; } c.innerHTML=html; }
function updateAll(){updateStats();renderActions();renderStory();}

function talkElder(){if(state.quest===0){log("Elder: Clear threats in the woods.",true);state.quest=1;}else if(state.quest===1&&state.kills>=3){state.player.gold+=40;state.quest=2;log("Elder gave you gold.",true);}else{log("Elder: Keep clearing the woods.");}updateAll();save();}

function openShop(){const modal=document.getElementById('shop-modal');const list=document.getElementById('shop-list');list.innerHTML='';document.getElementById('shop-gold').textContent=state.player.gold; const items=[{name:"Iron Sword",type:"weapon",bonus:7,price:55,flavor:"A sturdy blade.",effect:"+7 Damage"},{name:"Leather Armor",type:"armor",bonus:4,price:45,flavor:"Light protection.",effect:"+4 Defense"},{name:"Health Potion",type:"consumable",bonus:30,price:12,flavor:"Heals wounds.",effect:"+30 HP"},{name:"Mana Potion",type:"consumable",bonus:15,price:15,flavor:"Restores MP.",effect:"+15 MP"},{name:"Spell Tome: Heal",type:"spell",bonus:0,price:80,flavor:"Learn Heal spell.",effect:"Unlocks Heal"}]; items.forEach(item=>{const can=state.player.gold>=item.price; const d=document.createElement('div'); d.className=`p-3 rounded-2xl flex justify-between items-center ${can?'bg-zinc-800 active:bg-zinc-700':'bg-zinc-950 opacity-60'}`; d.innerHTML=`<div><div class="font-medium">${item.name}</div><div class="text-xs text-zinc-400">${item.effect}</div></div><div class="text-emerald-400 font-bold">${item.price}g</div>`; if(can) d.onclick=()=>buyFromShop(item); list.appendChild(d); }); modal.classList.remove('hidden');modal.classList.add('flex'); }
function buyFromShop(item){ if(state.player.gold<item.price)return; state.player.gold-=item.price; if(item.type==='weapon'){state.player.weapon={name:item.name,bonus:item.bonus};log(`Equipped ${item.name}!`);} else if(item.type==='armor'){state.player.armor={name:item.name,bonus:item.bonus};log(`Equipped ${item.name}!`);} else if(item.type==='spell'){if(!state.player.spells.includes('Heal'))state.player.spells.push('Heal');log('Learned Heal spell!');} else { state.inventory.push({id:Date.now(),name:item.name,type:'consumable',bonus:item.bonus,desc:item.effect,flavor:item.flavor}); log(`Added ${item.name} to inventory.`); } hideShop(); updateAll(); save(); }
function hideShop(){document.getElementById('shop-modal').classList.remove('flex');document.getElementById('shop-modal').classList.add('hidden');}

function restInn(){if(state.player.gold<8)return log("Not enough gold"); state.player.gold-=8; state.player.hp=state.player.maxHp; state.player.mp=state.player.maxMp; log("Recovered at the inn.",true); updateAll();save();}

function startFight(){const pool=[{name:"Goblin Scout",hp:22,maxHp:22,atk:7,def:2,xp:18,gold:6},{name:"Forest Wolf",hp:32,maxHp:32,atk:8,def:3,xp:26,gold:9}]; state.enemy=pool[Math.floor(Math.random()*pool.length)]; state.inCombat=true; document.getElementById('combat-log').innerHTML=''; addCombatLog(`You encounter a <b>${state.enemy.name}</b>`); updateCombatUI(); renderActions(); }

function searchLoot(){const now=Date.now(); if(now-state.lastLootTime<45000)return log("Wait before searching again."); state.lastLootTime=now; if(Math.random()<0.25){ log("You disturbed something dangerous..."); setTimeout(()=>{state.enemy={name:"Wild Wolf",hp:18,maxHp:18,atk:6,def:2,xp:14,gold:5}; state.inCombat=true; document.getElementById('combat-log').innerHTML=''; addCombatLog("A wolf attacks!"); updateCombatUI(); renderActions();},500); return;} if(Math.random()<0.6){const g=Math.floor(Math.random()*8)+6; state.player.gold+=g; log(`Found <b>${g} Gold</b>!`,true);} else log("Nothing found."); updateAll(); }

function exploreRuins(){if(Math.random()>0.4){state.enemy={name:"Skeleton",hp:45,maxHp:45,atk:9,def:5,xp:35,gold:18};state.inCombat=true;document.getElementById('combat-log').innerHTML='';addCombatLog("A skeleton attacks!");updateCombatUI();}else{state.player.gold+=25;state.inventory.push({id:Date.now(),name:"Health Potion",type:"consumable",bonus:30,desc:"Restores HP",flavor:"Found in ruins."});log("Found gold and a potion!");}updateAll();}

function addCombatLog(msg){const el=document.getElementById('combat-log'); const d=document.createElement('div');d.innerHTML=msg;el.appendChild(d);el.scrollTop=el.scrollHeight;}

function updateCombatUI(){const e=state.enemy;document.getElementById('enemy-name').innerHTML=e.name;document.getElementById('enemy-hp').innerHTML=e.hp;document.getElementById('enemy-max').innerHTML=e.maxHp;document.getElementById('enemy-atk').innerHTML=e.atk;}

function swordAttack(){if(!state.inCombat)return; const e=state.enemy; const p=state.player; let dmg=Math.max(3,Math.floor(5+p.str+(p.weapon.bonus||0)-e.def+Math.random()*3)); e.hp-=dmg; addCombatLog(`You hit for <span class="text-red-400">${dmg}</span>`); if(e.hp<=0)return endCombatWin(); let ed= Math.max(1,Math.floor(e.atk-p.def+Math.random()*2)); p.hp-=ed; addCombatLog(`${e.name} hits for ${ed}`); if(p.hp<=0){log("You were defeated...",true);setTimeout(()=>{p.hp=Math.floor(p.maxHp*0.4);state.location='village';endCombat();},1200);} updateCombatUI(); }

function castSpell(){if(!state.inCombat)return; const p=state.player; const e=state.enemy; if(p.mp<8)return addCombatLog("Not enough MP"); p.mp-=8; let dmg=Math.floor(10+p.int*1.4); e.hp-=dmg; addCombatLog(`Spell hits for <span class="text-blue-400">${dmg}</span>`); if(e.hp<=0)return endCombatWin(); let ed=Math.max(1,Math.floor(e.atk-p.def));p.hp-=ed; addCombatLog(`${e.name} hits back`); if(p.hp<=0){log("You fell.",true);setTimeout(()=>{p.hp=Math.floor(p.maxHp*0.4);state.location='village';endCombat();},1200);}updateCombatUI();}

function defend(){if(!state.inCombat)return; let d=Math.max(1,Math.floor(state.enemy.atk*0.55)); state.player.hp-=d; addCombatLog(`Defended, took ${d}`); if(state.player.hp<=0){log("Defeated.",true);setTimeout(()=>{state.player.hp=Math.floor(state.player.maxHp*0.4);state.location='village';endCombat();},1200);} updateCombatUI(); }

function flee(){if(Math.random()<0.5){log("Escaped!");endCombat();}else addCombatLog("Failed to flee!");}

function endCombatWin(){const e=state.enemy;const p=state.player; p.gold+=e.gold||8;p.xp+=e.xp||20;state.kills++; addCombatLog(`<b class="text-emerald-400">Victory!</b>`); log(`Defeated ${e.name}!`,true); if(Math.random()<0.45){state.inventory.push({id:Date.now(),name:"Health Potion",type:"consumable",bonus:30,desc:"Restores HP",flavor:"Looted."});log("Looted a potion!");} if(state.kills===4&&!p.spells.includes("Heal")){p.spells.push("Heal");log("Learned Heal!",true);} if(p.xp>=p.level*80+20){p.level++;p.xp=0;p.maxHp+=8;p.hp=p.maxHp;p.str++;p.int++;p.def++;log(`<b>LEVEL UP!</b> Level ${p.level}!`,true);} endCombat(); }

function endCombat(){state.inCombat=false;state.enemy=null;document.getElementById('combat').classList.add('hidden');renderActions();updateAll();save();}

function travel(dest){ hideMap(); if(dest==='village'){state.location='village';state.locationName='Eldoria Village Square';} else if(dest==='woods'){state.location='woods';state.locationName='Whispering Woods';} else if(dest==='ruins'){if(state.player.level<3)return log('Level 3 required'); state.location='ruins';state.locationName='Ruined Temple';} updateAll(); }

function showMap(){ 
    const modal = document.getElementById('map-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    // Position "You are here" marker
    setTimeout(() => {
        const marker = document.getElementById('you-are-here');
        if (!marker) return;
        marker.classList.add('hidden');
        if (state.location === 'village') marker.style.cssText = 'bottom: 70px; left: 70px;';
        else if (state.location === 'woods') marker.style.cssText = 'top: 45%; left: 45%;';
        else if (state.location === 'ruins') marker.style.cssText = 'top: 50px; right: 70px;';
        marker.classList.remove('hidden');
    }, 50);
}
function hideMap(){ document.getElementById('map-modal').classList.remove('flex'); document.getElementById('map-modal').classList.add('hidden'); }

function showInventory(){ const modal=document.getElementById('inv-modal'); const list=document.getElementById('inv-list'); list.innerHTML=''; if(state.inventory.length===0){list.innerHTML='<div class="p-4 text-center text-zinc-400">Empty</div>';} state.inventory.forEach((item,i)=>{ const div=document.createElement('div'); div.className='flex justify-between bg-zinc-800 p-3 rounded-2xl mb-2'; div.innerHTML=`<div><b>${item.name}</b><div class="text-xs text-zinc-400">${item.desc||''}</div></div>`; const actions=document.createElement('div'); actions.className='flex gap-1'; const useBtn=document.createElement('button'); useBtn.className='px-3 py-1 text-xs bg-amber-600 rounded-xl'; useBtn.textContent=item.type==='consumable'?'Use':'Equip'; useBtn.onclick=()=>useItem(i); const infoBtn=document.createElement('button'); infoBtn.className='px-2 py-1 text-xs bg-zinc-700 rounded-xl'; infoBtn.innerHTML='<i class="fas fa-info"></i>'; infoBtn.onclick=()=>showItemDetail(item); actions.appendChild(useBtn);actions.appendChild(infoBtn); div.appendChild(actions); list.appendChild(div); }); modal.classList.remove('hidden');modal.classList.add('flex'); }
function useItem(i){ const item=state.inventory[i]; const p=state.player; if(item.type==='consumable'){ if(item.name.includes('Health'))p.hp=Math.min(p.maxHp,p.hp+item.bonus); log(`Used ${item.name}.`); state.inventory.splice(i,1); } else { const isW=item.name.toLowerCase().includes('sword'); if(isW)p.weapon={name:item.name,bonus:item.bonus};else p.armor={name:item.name,bonus:item.bonus}; log(`Equipped ${item.name}.`); state.inventory.splice(i,1); } hideInv(); updateAll(); save(); }
function showItemDetail(item){ hideInv(); document.getElementById('item-detail-name').textContent=item.name; document.getElementById('item-detail-body').innerHTML=`<div><b>Effect:</b> ${item.desc||'Unknown'}</div><div class="mt-2 text-zinc-300">${item.flavor||''}</div>`; document.getElementById('item-detail-modal').classList.remove('hidden');document.getElementById('item-detail-modal').classList.add('flex'); }
function hideItemDetail(){document.getElementById('item-detail-modal').classList.remove('flex');document.getElementById('item-detail-modal').classList.add('hidden');setTimeout(showInventory,60);}
function hideInv(){document.getElementById('inv-modal').classList.remove('flex');document.getElementById('inv-modal').classList.add('hidden');}
function showStats(){const p=state.player; const html=`<div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50" onclick="this.remove()"><div class="bg-zinc-900 p-6 rounded-3xl max-w-xs mx-4"><h3 class="font-bold text-center mb-3">${p.name}</h3><div class="text-sm space-y-1"><div>Level ${p.level}</div><div>STR ${p.str} • INT ${p.int} • DEF ${p.def}</div><div>Weapon: ${p.weapon.name}</div><div>Armor: ${p.armor.name}</div></div><button onclick="this.closest('.fixed').remove()" class="mt-5 w-full py-2 bg-zinc-800 rounded-2xl">Close</button></div></div>`; document.body.insertAdjacentHTML('beforeend',html); }
function renameCharacter(){const n=prompt("Your name:",state.player.name); if(n){state.player.name=n; log(`You are now <b>${n}</b>.`,true); updateAll();}}
function exportLogs(){ const data={time:new Date().toISOString(),player:state.player,location:state.locationName,inventory:state.inventory,story:state.story}; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})); a.download=`spellblade-log-${Date.now()}.json`; a.click(); }
function save(){localStorage.setItem('spellblade_v3',JSON.stringify(state));}
function load(){const s=localStorage.getItem('spellblade_v3');if(s){try{Object.assign(state,JSON.parse(s));}catch(e){}}}
function init(){ load(); if(state.story.length===0){log(`You are <b>${state.player.name}</b>.`,true); log("Talk to the Elder to begin.");} document.getElementById('combat').classList.add('hidden'); updateAll(); }
window.onload=init;
</script>
</body>
</html>
