<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellblade Chronicles</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .fantasy-title { font-family: Georgia, serif; }
    #enemy-img { transition: opacity 0.2s ease; }
    .stat-card { transition: transform 0.1s ease; }
    .stat-card:hover { transform: translateY(-1px); }
    .item-row { transition: background-color 0.1s ease; }
    .item-row:hover { background-color: #27251f; }
    .town-card { transition: all 0.2s ease; }
    .town-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .dialogue-choice { transition: all 0.1s ease; }
    .dialogue-choice:hover { background-color: #27251f; transform: translateX(4px); }
</style>
</head>
<body class="bg-zinc-950 text-zinc-200">
<div class="game-container min-h-screen p-4 max-w-[680px] mx-auto">
    <div class="flex justify-between items-center mb-4">
        <h1 class="fantasy-title text-3xl text-amber-400">Spellblade Chronicles</h1>
        <div onclick="renameCharacter()" class="text-right cursor-pointer">
            <div id="player-name" class="font-bold text-xl text-amber-300">Aether</div>
            <div class="text-xs text-zinc-400">Level <span id="level">1</span></div>
        </div>
    </div>

    <div class="bg-zinc-900 rounded-2xl p-4 mb-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-heart text-red-500"></i> HP</span> <span id="hp">50/50</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="hp-bar" class="h-2 bg-green-500 rounded" style="width:100%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-sm"><span><i class="fas fa-magic text-blue-400"></i> MP</span> <span id="mp">20/20</span></div>
                <div class="h-2 bg-zinc-800 rounded"><div id="mp-bar" class="h-2 bg-blue-500 rounded" style="width:100%"></div></div>
            </div>
        </div>
        <div class="flex justify-between mt-2 text-sm">
            <div>XP <span id="xp" class="font-bold">0/100</span></div>
            <div>Gold <span id="gold" class="font-bold text-yellow-400">20</span></div>
            <div class="text-xs">STR <span id="str">5</span> • INT <span id="int">5</span> • DEF <span id="def">3</span></div>
        </div>
    </div>

    <div class="bg-zinc-900 rounded-2xl mb-4 overflow-hidden">
        <div onclick="toggleStory()" class="px-4 py-2 flex justify-between cursor-pointer bg-zinc-950">
            <span class="font-semibold"><i class="fas fa-book text-amber-400"></i> Story Log</span>
            <i id="story-icon" class="fas fa-chevron-up"></i>
        </div>
        <div id="story-box" class="p-4 max-h-[200px] overflow-auto text-sm"><div id="story"></div></div>
    </div>

    <div class="flex justify-between mb-2 px-1">
        <div class="font-bold"><i class="fas fa-map-marker-alt text-emerald-400"></i> <span id="location">Eldoria Village Square</span></div>
        <div class="flex gap-2">
            <button onclick="exportLogs()" class="text-xs px-3 py-1 bg-zinc-800 rounded-full">Logs</button>
            <button onclick="showMap()" class="px-3 py-1 bg-zinc-800 rounded-full text-sm"><i class="fas fa-map"></i> Map</button>
        </div>
    </div>

    <!-- Area / NPC Portrait -->
    <div id="area-portrait" class="hidden mb-4">
        <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-700">
            <img id="area-portrait-img" class="w-full h-48 object-cover" alt="Current area">
            <div class="p-3 text-sm" id="area-portrait-caption"></div>
        </div>
    </div>

    <div id="actions" class="grid grid-cols-2 gap-3 mb-4"></div>

    <!-- Combat - Compact layout -->
    <div id="combat" class="hidden bg-zinc-900 border border-red-900 rounded-2xl p-4 mb-4">
        <div class="flex gap-4">
            <!-- Enemy Portrait (square, ~half width) -->
            <div class="w-1/2 flex-shrink-0">
                <img id="enemy-img" class="w-full aspect-square object-cover rounded-xl border border-red-800/60" alt="Enemy" style="display:none;">
            </div>
            
            <!-- Enemy Info -->
            <div class="flex-1 min-w-0">
                <div class="mb-2">
                    <div id="enemy-name" class="font-bold text-red-400 text-lg"></div>
                    <div class="text-xs text-zinc-400">Enemy</div>
                </div>
                
                <div class="mb-3">
                    <div class="flex justify-between text-sm mb-1">
                        <span>HP</span>
                        <span id="enemy-hp"></span> / <span id="enemy-max"></span>
                    </div>
                    <div class="h-2 bg-zinc-800 rounded"><div id="enemy-hp-bar" class="h-2 bg-red-500 rounded" style="width:100%"></div></div>
                </div>

                <div id="combat-log" class="bg-black/60 p-2 rounded text-xs h-20 overflow-auto mb-3"></div>

                <div class="grid grid-cols-2 gap-2 text-sm" id="combat-buttons">
                    <button onclick="swordAttack()" class="bg-red-600 py-2 rounded-xl">Sword Attack</button>
                    <button onclick="castSpell()" class="bg-blue-600 py-2 rounded-xl">Cast Spell</button>
                    <button onclick="defend()" class="bg-zinc-700 py-2 rounded-xl">Defend</button>
                    <button onclick="flee()" class="bg-zinc-700 py-2 rounded-xl">Flee</button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex gap-2 justify-center">
        <button onclick="showInventory()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Inventory</button>
        <button onclick="showStats()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Character</button>
        <button onclick="save()" class="px-4 py-2 bg-emerald-800 rounded-xl text-sm">Save</button>
    </div>
</div>

<!-- Intro Modal -->
<div id="intro-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-6 hidden">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full p-7 border border-zinc-700">
        <h2 class="fantasy-title text-2xl text-amber-400 mb-4 text-center" id="intro-title"></h2>
        <div id="intro-text" class="space-y-3 text-sm text-zinc-300 mb-6"></div>
        <div class="flex gap-3">
            <button onclick="startGame(true)" class="flex-1 py-3 bg-emerald-700 hover:bg-emerald-600 rounded-2xl font-bold">Begin Adventure</button>
            <button onclick="startGame(false)" class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl">Skip Intro</button>
        </div>
    </div>
</div>

<!-- Map Modal - Bigger window -->
<div id="map-modal" onclick="if(event.target.id==='map-modal') hideMap()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-2 z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl w-full max-w-[min(98vw,780px)] p-2 md:p-4">
        <div class="flex justify-between mb-2 items-center px-2">
            <div>
                <h3 class="font-bold text-xl">World Map</h3>
                <p class="text-xs text-zinc-400">Eldoria Region</p>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center bg-zinc-800 rounded-full text-sm overflow-hidden border border-zinc-700">
                    <button onclick="zoomMap(-0.2)" class="px-3 py-1 hover:bg-zinc-700 active:bg-zinc-600 transition-colors" title="Zoom out">-</button>
                    <div class="px-2 text-xs text-zinc-400 select-none" id="zoom-level">100%</div>
                    <button onclick="zoomMap(0.2)" class="px-3 py-1 hover:bg-zinc-700 active:bg-zinc-600 transition-colors" title="Zoom in">+</button>
                </div>
                <button onclick="resetMapZoom()" class="text-xs px-2.5 py-1 bg-zinc-800 hover:bg-zinc-700 rounded-full border border-zinc-700">Reset</button>
                <button onclick="hideMap()" class="text-2xl leading-none ml-1">&times;</button>
            </div>
        </div>

        <div class="relative w-full rounded-2xl overflow-hidden border-2 border-emerald-600 shadow-xl" style="aspect-ratio: 16 / 10;">
            <div id="map-content" style="position:absolute; top:0; left:0; width:100%; height:100%; transform-origin:center center; transition:transform 0.2s ease;">
                <img src="assets/map/world-map.jpg" class="w-full h-full object-cover" alt="World Map">

                <div onclick="travel('village'); hideMap();" class="absolute cursor-pointer" style="bottom: 38%; left: 28%;">
                    <div class="w-11 h-11 flex items-center justify-center bg-emerald-600 rounded-full shadow-lg ring-2 ring-white/70 hover:scale-110 transition-transform">
                        <i class="fas fa-home text-white text-xl"></i>
                    </div>
                    <div class="text-[10px] font-bold text-center text-emerald-300 mt-0.5 drop-shadow">Village</div>
                </div>

                <div onclick="travel('woods'); hideMap();" class="absolute cursor-pointer" style="bottom: 32%; left: 48%;">
                    <div class="w-11 h-11 flex items-center justify-center bg-orange-600 rounded-full shadow-lg ring-2 ring-white/70 hover:scale-110 transition-transform">
                        <i class="fas fa-tree text-white text-xl"></i>
                    </div>
                    <div class="text-[10px] font-bold text-center text-orange-300 mt-0.5 drop-shadow">Woods</div>
                </div>

                <div onclick="travel('ruins'); hideMap();" class="absolute cursor-pointer" style="top: 22%; right: 18%;">
                    <div class="w-11 h-11 flex items-center justify-center bg-purple-600 rounded-full shadow-lg ring-2 ring-white/70 hover:scale-110 transition-transform">
                        <i class="fas fa-archway text-white text-xl"></i>
                    </div>
                    <div class="text-[10px] font-bold text-center text-purple-300 mt-0.5 drop-shadow">Temple</div>
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-zinc-400 mt-2">Tap to travel • Use +/- or pinch to zoom • Drag to pan</p>
    </div>
</div>

<!-- Dialogue Modal -->
<div id="dialogue-modal" class="hidden fixed inset-0 bg-black/80 flex items-end justify-center z-[90] p-2">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-t-3xl w-full max-w-[680px] p-5">
        <div class="flex justify-between items-center mb-4">
            <div id="dialogue-npc-name" class="font-bold text-xl text-amber-300"></div>
            <button onclick="closeDialogue()" class="text-2xl leading-none">&times;</button>
        </div>

        <div class="flex gap-4 mb-4">
            <!-- NPC Portrait -->
            <div class="w-28 h-28 flex-shrink-0 rounded-2xl overflow-hidden border border-zinc-700">
                <img id="dialogue-portrait" class="w-full h-full object-cover" alt="NPC">
            </div>
            <div class="flex-1">
                <div id="dialogue-text" class="text-sm leading-relaxed text-zinc-200"></div>
            </div>
        </div>

        <div id="dialogue-choices" class="space-y-2"></div>
    </div>
</div>

<script src="lore.js"></script>
<script>
let state = {
    player: {name:"Aether",level:1,hp:50,maxHp:50,mp:20,maxMp:20,xp:0,gold:20,str:5,int:5,def:3,weapon:{name:"Rusty Sword",bonus:3},armor:{name:"Cloth Tunic",bonus:1},spells:["Firebolt"]},
    inventory: [{id:1,name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP", quantity: 2}],
    location:"village",locationName:"Eldoria Village Square",
    quest:0,kills:0,inCombat:false,enemy:null,story:[],lastLootTime:0
};
let storyOpen = true;
let mapZoom = 1;
let mapPanX = 0;
let mapPanY = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let villageSpot = 'square';

function applyMapTransform() {
    const content = document.getElementById('map-content');
    if (content) {
        content.style.transform = `scale(${mapZoom}) translate(${mapPanX}px, ${mapPanY}px)`;
    }
    const levelEl = document.getElementById('zoom-level');
    if (levelEl) levelEl.textContent = Math.round(mapZoom * 100) + '%';
}

function recalculateMaxStats() {
    const p = state.player;
    const calculatedMaxMp = 20 + Math.floor(p.int * 2.2);
    if (calculatedMaxMp > p.maxMp) {
        p.maxMp = calculatedMaxMp;
        p.mp = Math.min(p.mp, p.maxMp);
    }
}

function log(msg, important = false) {
    state.story.push({msg, important});
    if (state.story.length > 15) state.story.shift();
    renderStory();
}

function renderStory() {
    const el = document.getElementById('story');
    el.innerHTML = '';
    state.story.slice(-9).forEach(s => {
        const p = document.createElement('p');
        p.className = `mb-1.5 text-sm ${s.important ? 'text-amber-300 font-medium' : 'text-zinc-300'}`;
        p.innerHTML = s.msg;
        el.appendChild(p);
    });
}

function updateStats() {
    const p = state.player;
    document.getElementById('player-name').textContent = p.name;
    document.getElementById('level').textContent = p.level;
    document.getElementById('hp').textContent = `${p.hp}/${p.maxHp}`;
    document.getElementById('mp').textContent = `${p.mp}/${p.maxMp}`;
    document.getElementById('xp').textContent = `${p.xp}/${p.level * 80 + 20}`;
    document.getElementById('gold').textContent = p.gold;
    document.getElementById('str').textContent = p.str;
    document.getElementById('int').textContent = p.int;
    document.getElementById('def').textContent = p.def;
    document.getElementById('hp-bar').style.width = Math.max(0, (p.hp / p.maxHp) * 100) + '%';
    document.getElementById('mp-bar').style.width = Math.max(0, (p.mp / p.maxMp) * 100) + '%';
    document.getElementById('location').textContent = state.locationName;
}

function toggleStory() {
    const box = document.getElementById('story-box');
    storyOpen = !storyOpen;
    box.style.display = storyOpen ? '' : 'none';
    document.getElementById('story-icon').className = storyOpen ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
}

function showAreaPortrait(type, caption) {
    const container = document.getElementById('area-portrait');
    const img = document.getElementById('area-portrait-img');
    const cap = document.getElementById('area-portrait-caption');

    let src = '';
    if (type === 'chapel') src = 'assets/areas/chapel.jpg';
    else if (type === 'magontha') src = 'assets/npcs/magontha.jpg';
    else if (type === 'elder') src = 'assets/npcs/elder.jpg';
    else if (type === 'merchant') src = 'assets/npcs/merchant.jpg';

    if (src) {
        img.src = src;
        cap.innerHTML = caption || '';
        container.classList.remove('hidden');
        container.classList.add('block');
    } else {
        container.classList.add('hidden');
    }
}

function hideAreaPortrait() {
    const container = document.getElementById('area-portrait');
    container.classList.add('hidden');
}

function renderActions() {
    const c = document.getElementById('actions');
    c.innerHTML = '';
    if (state.inCombat) { document.getElementById('combat').classList.remove('hidden'); return; }
    document.getElementById('combat').classList.add('hidden');
    hideAreaPortrait();

    const loc = state.location;

    if (loc === 'village') {
        if (villageSpot === 'square') {
            let html = `<div class="mb-2 px-1"><span class="font-semibold text-emerald-400">Village Square</span></div>`;
            html += `<div class="grid grid-cols-2 gap-3">`;
            
            html += `<div onclick="goToEldersHut()" class="town-card bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl cursor-pointer flex flex-col items-center text-center">
                <i class="fas fa-user-tie text-amber-400 text-xl mb-1"></i>
                <div class="font-bold text-sm">Elder's Hut</div>
                <div class="text-[10px] text-zinc-400">Talk to the village elder</div>
            </div>`;
            
            html += `<div onclick="goToChapel()" class="town-card bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl cursor-pointer flex flex-col items-center text-center border border-emerald-900/50">
                <i class="fas fa-church text-emerald-400 text-xl mb-1"></i>
                <div class="font-bold text-sm text-emerald-300">Chapel</div>
                <div class="text-[10px] text-zinc-400">Speak with Magontha</div>
            </div>`;
            
            html += `<div onclick="goToMarket()" class="town-card bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl cursor-pointer flex flex-col items-center text-center">
                <i class="fas fa-store text-emerald-400 text-xl mb-1"></i>
                <div class="font-bold text-sm">Market</div>
                <div class="text-[10px] text-zinc-400">Visit the merchant</div>
            </div>`;
            
            html += `<div onclick="goToInn()" class="town-card bg-zinc-800 hover:bg-zinc-700 p-3 rounded-2xl cursor-pointer flex flex-col items-center text-center">
                <i class="fas fa-bed text-blue-400 text-xl mb-1"></i>
                <div class="font-bold text-sm">The Inn</div>
                <div class="text-[10px] text-zinc-400">Rest and recover</div>
            </div>`;
            
            html += `</div>`;
            c.innerHTML = html;
        } 
        else if (villageSpot === 'chapel') {
            let html = `<div class="mb-3"><span class="font-semibold text-emerald-400">Chapel</span></div>`;
            html += `<button onclick="startDialogue('magontha')" class="w-full bg-emerald-800 hover:bg-emerald-700 p-3 rounded-2xl mb-2 flex items-center gap-3"><i class="fas fa-pray text-emerald-300"></i> <span>Talk to Magontha</span></button>`;
            html += `<button onclick="backToVillageSquare()" class="w-full bg-zinc-700 hover:bg-zinc-600 p-3 rounded-2xl flex items-center gap-3"><i class="fas fa-arrow-left"></i> <span>Back to Village Square</span></button>`;
            c.innerHTML = html;
            showAreaPortrait('chapel', 'The small chapel of Eldoria');
        }
        else {
            c.innerHTML = `<button onclick="backToVillageSquare()" class="w-full bg-zinc-700 p-3 rounded-2xl">Back to Village Square</button>`;
        }
    } 
    else if (loc === 'woods') {
        let html = '';
        html += `<button onclick="startFight()" class="rpg-btn bg-red-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-skull"></i><span>Look for Combat</span></button>`;
        html += `<button onclick="searchLoot()" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-search text-amber-400"></i><span>Search for Loot</span></button>`;
        html += `<button onclick="travel('village')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-home text-emerald-400"></i><span>Return to Village</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`;
        c.innerHTML = html;
    } 
    else if (loc === 'ruins') {
        let html = '';
        html += `<button onclick="searchTempleHall()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-search"></i><span>Search the Hall</span></button>`;
        html += `<button onclick="descendDeeper()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-arrow-down"></i><span>Descend Deeper</span></button>`;
        html += `<button onclick="investigateAltar()" class="rpg-btn bg-purple-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-gem"></i><span>Investigate Altar</span></button>`;
        html += `<button onclick="travel('woods')" class="rpg-btn bg-zinc-800 p-3 rounded-2xl flex gap-3"><i class="fas fa-arrow-left text-emerald-400"></i><span>Back to Woods</span></button>`;
        html += `<button onclick="showMap()" class="rpg-btn bg-emerald-900/70 p-3 rounded-2xl flex gap-3"><i class="fas fa-map"></i><span>Map</span></button>`;
        c.innerHTML = html;
    }
}

function updateAll() { updateStats(); renderActions(); renderStory(); }

function backToVillageSquare() {
    villageSpot = 'square';
    hideAreaPortrait();
    updateAll();
}

function goToEldersHut() {
    startDialogue('elder');
}

function goToMarket() {
    startDialogue('merchant');
}

function goToInn() {
    restInn();
}

function goToChapel() {
    villageSpot = 'chapel';
    log("You step into the quiet chapel. Soft light filters through stained glass.", true);
    updateAll();
}

function startDialogue(npc) {
    const modal = document.getElementById('dialogue-modal');
    const nameEl = document.getElementById('dialogue-npc-name');
    const textEl = document.getElementById('dialogue-text');
    const choicesEl = document.getElementById('dialogue-choices');
    const portrait = document.getElementById('dialogue-portrait');

    modal.classList.remove('hidden');
    modal.classList.add('flex');
    choicesEl.innerHTML = '';

    if (npc === 'magontha') {
        nameEl.textContent = 'Magontha';
        portrait.src = 'assets/npcs/magontha.jpg';
        textEl.innerHTML = "'Welcome, child of the light. The shadows grow stronger, but faith can still guide us.'";
        
        choicesEl.innerHTML = `
            <div onclick="talkToMagonthaKeepOpen()" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-pray text-emerald-400 w-5"></i> <span>Ask for healing</span>
            </div>
            <div onclick="closeDialogue()" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-door-open text-zinc-400 w-5"></i> <span>Goodbye</span>
            </div>
        `;
    } 
    else if (npc === 'elder') {
        nameEl.textContent = 'Village Elder';
        portrait.src = 'assets/npcs/elder.jpg';
        textEl.innerHTML = "'Ah, it's you again. What brings you to my door?'";
        
        choicesEl.innerHTML = `
            <div onclick="talkElder(); closeDialogue();" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-comments text-amber-400 w-5"></i> <span>Talk</span>
            </div>
            <div onclick="closeDialogue()" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-door-open text-zinc-400 w-5"></i> <span>Goodbye</span>
            </div>
        `;
    } 
    else if (npc === 'merchant') {
        nameEl.textContent = 'Merchant';
        portrait.src = 'assets/npcs/merchant.jpg';
        textEl.innerHTML = "'Hey there, looking to deal in some damage or armor? What can I do for you?'";
        
        choicesEl.innerHTML = `
            <div onclick="openShop(); closeDialogue();" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-store text-emerald-400 w-5"></i> <span>Browse Shop</span>
            </div>
            <div onclick="showMerchantQuests()" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-scroll text-amber-400 w-5"></i> <span>Quests</span>
            </div>
            <div onclick="closeDialogue()" class="dialogue-choice bg-zinc-800 p-3 rounded-2xl cursor-pointer flex items-center gap-3">
                <i class="fas fa-door-open text-zinc-400 w-5"></i> <span>Goodbye</span>
            </div>
        `;
    }
}

function closeDialogue() {
    const modal = document.getElementById('dialogue-modal');

function talkElder() {
    const elder = Lore.elder;
    if (state.quest === 0) {
        elder.stage0.forEach(line => log(line, true));
        state.quest = 1;
    } else if (state.quest === 1 && state.kills >= 3) {
        elder.stage1_complete.forEach(line => log(line, true));
        state.player.gold += 40;
        state.quest = 2;
    } else if (state.quest === 2) {
        elder.stage2.forEach(line => log(line, true));
    } else {
        elder.default.forEach(line => log(line));
    }

}

function buyFromShop(item) {
    if (state.player.gold < item.price) return;
    state.player.gold -= item.price;
    
    if (item.type === "weapon") {
        if (state.player.weapon && state.player.weapon.name !== "Rusty Sword") addToInventory({name: state.player.weapon.name, type:"weapon", bonus: state.player.weapon.bonus, desc:"Old weapon"});
        state.player.weapon = {name: item.name, bonus: item.bonus};
    } else if (item.type === "armor") {
        if (state.player.armor && state.player.armor.name !== "Cloth Tunic") {
            if (state.player.armor.healthBonus) {
                state.player.maxHp = Math.max(50, state.player.maxHp - state.player.armor.healthBonus);
                state.player.hp = Math.min(state.player.hp, state.player.maxHp);
            }
            if (state.player.armor.manaBonus) {
                state.player.maxMp = Math.max(20, state.player.maxMp - state.player.armor.manaBonus);
                state.player.mp = Math.min(state.player.mp, state.player.maxMp);
            }
            if (state.player.armor.bonus) state.player.def = Math.max(0, state.player.def - state.player.armor.bonus);
            addToInventory({name: state.player.armor.name, type:"armor", bonus: state.player.armor.bonus, desc:"Old armor", healthBonus: state.player.armor.healthBonus, manaBonus: state.player.armor.manaBonus});
        }
        
        state.player.armor = {name: item.name, bonus: item.bonus, healthBonus: item.healthBonus || 0, manaBonus: item.manaBonus || 0};
        
        if (item.healthBonus) {
            state.player.maxHp += item.healthBonus;
            state.player.hp += item.healthBonus;
        }
        if (item.manaBonus) {
            state.player.maxMp += item.manaBonus;
            state.player.mp += item.manaBonus;
        }
        if (item.bonus) state.player.def += item.bonus;
        
    } else if (item.type === "spell") {
        if (item.name.includes("Ice Shard") && !state.player.spells.includes("Ice Shard")) {
            state.player.spells.push("Ice Shard");
            log("You learned <b>Ice Shard</b>!", true);
        } else if (!state.player.spells.includes("Heal")) {
            state.player.spells.push("Heal");
        }
    } else {
        addToInventory({name: item.name, type:"consumable", bonus: item.bonus, desc: item.effect, quantity:1});
    }
    log(`You obtained <b>${item.name}</b>.`);
    updateAll(); save();
}

function addToInventory(newItem) {
    if (newItem.type === 'consumable') {
        const existing = state.inventory.findIndex(i => i.name === newItem.name);
        if (existing !== -1) { state.inventory[existing].quantity = (state.inventory[existing].quantity || 1) + (newItem.quantity || 1); return; }
    }
    newItem.id = Date.now();
    if (!newItem.quantity && newItem.type === 'consumable') newItem.quantity = 1;
    state.inventory.push(newItem);
}

function restInn() {
    if (state.player.gold < 8) return log("Not enough gold.");
    state.player.gold -= 8;
    state.player.hp = state.player.maxHp;
    state.player.mp = state.player.maxMp;
    log("You rest at the inn and recover.", true);
    updateAll(); save();
}

function setEnemyImage(enemyName) {
    const img = document.getElementById('enemy-img');
    if (!img) return;
    let src = 'assets/creatures/forest-wolf.jpg';
    const n = (enemyName || '').toLowerCase();
    if (n.includes('goblin')) src = 'assets/creatures/goblin-scout.jpg';
    else if (n.includes('shadow') || n.includes('stalker')) src = 'assets/creatures/shadow-stalker.jpg';
    else if (n.includes('skeleton') || n.includes('guardian')) src = 'assets/creatures/skeleton-warrior.jpg';
    else if (n.includes('wolf')) src = 'assets/creatures/forest-wolf.jpg';
    else if (n.includes('fallen') || n.includes('spellblade')) src = 'assets/creatures/fallen-spellblade.jpg';
    img.src = src;
    img.style.display = 'block';
    img.onerror = () => img.style.display = 'none';
}

function addCombatLog(msg) {
    const el = document.getElementById('combat-log');
    const d = document.createElement('div');
    d.innerHTML = msg;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
}

function updateCombatUI() {
    if (!state.enemy) return;
    const e = state.enemy;
    document.getElementById('enemy-name').innerHTML = e.name;
    document.getElementById('enemy-hp').innerHTML = e.hp;
    document.getElementById('enemy-max').innerHTML = e.maxHp;
    
    const hpPercent = Math.max(0, (e.hp / e.maxHp) * 100);
    const hpBar = document.getElementById('enemy-hp-bar');
    if (hpBar) hpBar.style.width = hpPercent + '%';
    
    updateStats();
}

function swordAttack() {
    if (!state.inCombat || !state.enemy) return;
    const e = state.enemy; const p = state.player;
    let dmg = Math.max(3, Math.floor(6 + p.str * 1.1 + (p.weapon.bonus||0) - e.def + Math.random()*3));
    e.hp -= dmg;
    addCombatLog(`You strike for <span class="text-red-400">${dmg}</span> damage.`);
    if (e.hp <= 0) return endCombatWin();
    let edmg = Math.max(1, Math.floor(e.atk - p.def + Math.random()*2));
    p.hp -= edmg;
    addCombatLog(`${e.name} hits you for ${edmg}.`);
    if (p.hp <= 0) { log("You have fallen...", true); setTimeout(()=>{p.hp=Math.floor(p.maxHp*0.4);state.location='village';endCombat();},1000); }
    updateCombatUI();
}

function castSpell() {
    if (!state.inCombat || !state.enemy) return;
    const p = state.player;
    const container = document.getElementById('combat-buttons');
    
    let spellButtons = '';
    if (p.spells.includes('Firebolt')) {
        spellButtons += `<button onclick="castFirebolt(); renderCombatButtons();" class="bg-blue-600 py-2 rounded-xl">Firebolt (8 MP)</button>`;
    }
    if (p.spells.includes('Ice Shard')) {
        spellButtons += `<button onclick="castIceShard(); renderCombatButtons();" class="bg-cyan-600 py-2 rounded-xl">Ice Shard (12 MP)</button>`;
    }
    if (p.spells.includes('Heal')) {
        spellButtons += `<button onclick="castHealSpell(); renderCombatButtons();" class="bg-emerald-600 py-2 rounded-xl">Heal (10 MP)</button>`;
    }
    
    container.innerHTML = spellButtons || `<button onclick="castFirebolt()" class="bg-blue-600 py-2 rounded-xl col-span-2">Firebolt (8 MP)</button>`;
    setTimeout(() => { if (state.inCombat) renderCombatButtons(); }, 9000);
}

function castFirebolt() {
    if (!state.inCombat || !state.enemy) return;
    const p = state.player; const e = state.enemy;
    if (p.mp < 8) return addCombatLog("Not enough mana!");
    p.mp -= 8;
    let dmg = Math.floor(12 + p.int * 1.7);
    e.hp -= dmg;
    addCombatLog(`Firebolt hits for <span class="text-blue-400">${dmg}</span> damage!`);
    if (e.hp <= 0) return endCombatWin();
    let edmg = Math.max(1, Math.floor(e.atk - p.def));
    p.hp -= edmg;
    addCombatLog(`${e.name} strikes back.`);
    if (p.hp <= 0) { log("You have fallen...", true); setTimeout(()=>{p.hp=Math.floor(p.maxHp*0.4);state.location='village';endCombat();},1000); }
    renderCombatButtons();
    updateCombatUI();
}

function castIceShard() {
    if (!state.inCombat || !state.enemy) return;
    const p = state.player; const e = state.enemy;
    if (p.mp < 12) return addCombatLog("Not enough mana!");
    p.mp -= 12;
    let dmg = Math.floor(22 + p.int * 2.1);
    e.hp -= dmg;
    addCombatLog(`<span class="text-cyan-400">Ice Shard</span> hits for <span class="text-cyan-400">${dmg}</span> damage!`);
    if (e.hp <= 0) return endCombatWin();
    let edmg = Math.max(1, Math.floor(e.atk * 0.9 - p.def));
    p.hp -= edmg;
    addCombatLog(`${e.name} strikes back.`);
    if (p.hp <= 0) { log("You have fallen...", true); setTimeout(()=>{p.hp=Math.floor(p.maxHp*0.4);state.location='village';endCombat();},1000); }
    renderCombatButtons();
    updateCombatUI();
}

function castHealSpell() {
    if (!state.inCombat) return;
    const p = state.player;
    if (p.mp < 10) return addCombatLog("Not enough mana!");
    p.mp -= 10;
    const heal = Math.floor(20 + p.int * 1.5);
    p.hp = Math.min(p.maxHp, p.hp + heal);
    addCombatLog(`You cast <b>Heal</b> and recover <span class="text-emerald-400">${heal}</span> HP.`);
    if (state.enemy && Math.random() < 0.5) {
        let edmg = Math.max(1, Math.floor(state.enemy.atk * 0.6));
        p.hp -= edmg;
        addCombatLog(`${state.enemy.name} counters for ${edmg}.`);
    }
    renderCombatButtons();
    updateCombatUI();
}

function renderCombatButtons() {
    const container = document.getElementById('combat-buttons');
    container.innerHTML = `
        <button onclick="swordAttack()" class="bg-red-600 py-2 rounded-xl">Sword Attack</button>
        <button onclick="castSpell()" class="bg-blue-600 py-2 rounded-xl">Cast Spell</button>
        <button onclick="defend()" class="bg-zinc-700 py-2 rounded-xl">Defend</button>
        <button onclick="flee()" class="bg-zinc-700 py-2 rounded-xl">Flee</button>
    `;
}

function defend() {
    if (!state.inCombat || !state.enemy) return;
    let dmg = Math.max(1, Math.floor(state.enemy.atk * 0.55));
    state.player.hp -= dmg;
    addCombatLog(`You defend and take ${dmg} damage.`);
    if (state.player.hp <= 0) { log("You have fallen.", true); setTimeout(()=>{state.player.hp=Math.floor(state.player.maxHp*0.4);state.location='village';endCombat();},1000); }
    updateCombatUI();
}

function flee() {
    if (Math.random() < 0.5) { log("You escaped!"); endCombat(); }
    else addCombatLog("Couldn't get away!");
}

function endCombatWin() {
    const e = state.enemy; const p = state.player;
    p.gold += e.gold || 10; p.xp += e.xp || 20; state.kills++;
    addCombatLog(`<b class="text-emerald-400">Victory!</b>`);
    log(`You defeated the ${e.name}.`, true);
    if (Math.random() < 0.4) addToInventory({name:"Health Potion",type:"consumable",bonus:30,desc:"Restores 30 HP",quantity:1});
    if (state.kills === 4 && !p.spells.includes("Heal")) { p.spells.push("Heal"); log("You learned the <b>Heal</b> spell!", true); }
    if (p.xp >= p.level * 80 + 20) {
        p.level++; p.xp=0; p.maxHp += 7; p.hp = p.maxHp; p.str++; p.int++; p.def++;
        recalculateMaxStats();
        log(`<b>LEVEL UP!</b> You are now Level ${p.level}! <span class="text-blue-400">(INT increased Max MP)</span>`, true);
    }
    endCombat();
}

function endCombat() {
    state.inCombat = false;
    state.enemy = null;
    const img = document.getElementById('enemy-img');
    if (img) img.style.display = 'none';
    document.getElementById('combat').classList.add('hidden');
    renderActions();
    updateAll();
    save();
}

function showMap() {

    modal.classList.remove('hidden');
    modal.classList.add('flex');
    mapZoom = 1;
    mapPanX = 0;
    mapPanY = 0;

        applyMapTransform();

}

function hideMap() {
    const modal = document.getElementById('map-modal');
    modal.classList.remove('flex');
    modal.classList.add('hidden');
    mapPanX = 0;
    mapPanY = 0;
}

function setupMapDragging() {
    const content = document.getElementById('map-content');
    if (!content) return;

    content.onmousedown = function(e) {
        if (mapZoom <= 1) return;
        isDragging = true;
        dragStartX = e.clientX - mapPanX;
        dragStartY = e.clientY - mapPanY;
        content.style.cursor = 'grabbing';
    };

    document.onmousemove = function(e) {
        if (!isDragging) return;
        mapPanX = e.clientX - dragStartX;
        mapPanY = e.clientY - dragStartY;
        applyMapTransform();
    };

    document.onmouseup = function() {
        if (isDragging) {
            isDragging = false;
            if (content) content.style.cursor = 'grab';
        }
    };

    content.onmouseleave = function() {
        if (isDragging) {
            isDragging = false;
            content.style.cursor = 'grab';
        }
    };

    content.ontouchstart = function(e) {
        if (mapZoom <= 1 || !e.touches || e.touches.length !== 1) return;
        isDragging = true;
        dragStartX = e.touches[0].clientX - mapPanX;
        dragStartY = e.touches[0].clientY - mapPanY;
    };

    content.ontouchmove = function(e) {
        if (!isDragging || !e.touches || e.touches.length !== 1) return;
        e.preventDefault();
        mapPanX = e.touches[0].clientX - dragStartX;
        mapPanY = e.touches[0].clientY - dragStartY;
        applyMapTransform();
    };

    content.ontouchend = function() {
        isDragging = false;
    };

    content.style.cursor = (mapZoom > 1) ? 'grab' : 'default';
}

function zoomMap(delta) {
    const oldZoom = mapZoom;
    mapZoom = Math.max(0.5, Math.min(4, mapZoom + delta));
    if (oldZoom !== mapZoom) {
        mapPanX *= (mapZoom / oldZoom);
        mapPanY *= (mapZoom / oldZoom);
    }
    applyMapTransform();
}

function resetMapZoom() {
    mapZoom = 1;
    mapPanX = 0;
    mapPanY = 0;
    applyMapTransform();
}

function showInventory() {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black/70 flex items-end justify-center z-50';
    
    let consumablesHTML = '';
    let equipmentHTML = '';
    
    state.inventory.forEach((item, i) => {
        const qty = item.quantity || 1;
        const isConsumable = item.type === 'consumable';
        const icon = isConsumable ? 'fa-flask' : (item.name.toLowerCase().includes('sword') ? 'fa-sword' : 'fa-shield-alt');
        const greenClass = item.name.includes('Mail') ? 'border-l-4 border-emerald-500' : '';
        
        const row = `<div class="item-row flex justify-between bg-zinc-800 p-3 rounded-2xl mb-2 ${greenClass}">
            <div class="flex items-center gap-3">
                <i class="fas ${icon} text-amber-400 w-5"></i>
                <div>
                    <b class="${item.name.includes('Mail') ? 'text-emerald-400' : ''}">${item.name}</b>${qty > 1 ? ` <span class="text-xs bg-zinc-700 px-1.5 rounded">x${qty}</span>` : ''}
                    <div class="text-xs text-zinc-400">${item.desc || ''}</div>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="useItem(${i}); this.closest('.fixed').remove()" class="px-3 py-1 text-xs ${isConsumable ? 'bg-amber-600' : 'bg-emerald-600'} rounded-xl">${isConsumable ? 'Use' : 'Equip'}</button>
                <button onclick="dropItem(${i}); this.closest('.fixed').remove()" class="px-2 py-1 text-xs bg-zinc-700 hover:bg-red-900 rounded-xl">Drop</button>
            </div>
        </div>`;
        
        if (isConsumable) consumablesHTML += row;
        else equipmentHTML += row;
    });
    
    let html = `<div class="bg-zinc-900 w-full max-w-md rounded-t-3xl p-5">
        <div class="flex justify-between mb-4 items-center">
            <h3 class="font-bold text-lg">Inventory</h3>
            <button onclick="this.closest('.fixed').remove()" class="text-xl">&times;</button>
        </div>`;
    
    if (consumablesHTML) {
        html += `<div class="mb-4"><div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">Consumables</div>${consumablesHTML}</div>`;
    }
    if (equipmentHTML) {
        html += `<div class="mb-4"><div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">Equipment</div>${equipmentHTML}</div>`;
    }
    if (!consumablesHTML && !equipmentHTML) {
        html += '<div class="p-4 text-center text-zinc-400">Your inventory is empty.</div>';
    }
    html += `</div>`;
    
    modal.innerHTML = html;
    document.body.appendChild(modal);
}

function dropItem(i) {
    const item = state.inventory[i];
    if (confirm(`Drop ${item.name}?`)) {
        state.inventory.splice(i, 1);
        log(`You dropped ${item.name}.`);
        updateAll();
        setTimeout(showInventory, 80);
    }
}

function useItem(i) {
    const item = state.inventory[i]; const p = state.player;
    if (item.type === 'consumable') {
        if (item.name.includes('Health')) p.hp = Math.min(p.maxHp, p.hp + item.bonus);
        if (item.name.includes('Mana')) p.mp = Math.min(p.maxMp, p.mp + item.bonus);
        log(`Used ${item.name}.`);
        if ((item.quantity||1) > 1) item.quantity--; else state.inventory.splice(i,1);
    } else {
        if (!item.type && item.name.toLowerCase().includes('armor') || item.type === 'armor') {
            if (p.armor && p.armor.name !== "Cloth Tunic") {
                if (p.armor.healthBonus) { p.maxHp -= p.armor.healthBonus; p.hp = Math.min(p.hp, p.maxHp); }
                if (p.armor.manaBonus) { p.maxMp -= p.armor.manaBonus; p.mp = Math.min(p.mp, p.maxMp); }
                if (p.armor.bonus) p.def = Math.max(0, p.def - p.armor.bonus);
                addToInventory(p.armor);
            }
            p.armor = {name: item.name, bonus: item.bonus || 0, healthBonus: item.healthBonus || 0, manaBonus: item.manaBonus || 0};
            if (item.healthBonus) { p.maxHp += item.healthBonus; p.hp += item.healthBonus; }
            if (item.manaBonus) { p.maxMp += item.manaBonus; p.mp += item.manaBonus; }
            if (item.bonus) p.def += item.bonus;
            log(`Equipped <b>${item.name}</b>.`);
            state.inventory.splice(i,1);
        } else {
            const isWeapon = item.type === 'weapon' || item.name.toLowerCase().includes('sword');
            if (isWeapon) {
                if (p.weapon && p.weapon.name !== "Rusty Sword") addToInventory(p.weapon);
                p.weapon = {name: item.name, bonus: item.bonus};
                log(`Equipped <b>${item.name}</b>.`);
            }
            state.inventory.splice(i,1);
        }
    }
    updateAll(); save();
}

function showStats() {
    const p = state.player;
    const weaponDmg = Math.floor(6 + p.str * 1.1 + (p.weapon.bonus || 0));
    const spellPower = Math.floor(12 + p.int * 1.7);
    
    const div = document.createElement('div');
    div.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
    
    div.innerHTML = `
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md p-6 border border-zinc-700">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <div class="font-bold text-2xl">${p.name}</div>
                    <div class="text-emerald-400">Level ${p.level} Spellblade</div>
                </div>
                <button onclick="this.closest('.fixed').remove()" class="text-3xl leading-none text-zinc-400 hover:text-white">&times;</button>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="stat-card bg-zinc-800 rounded-2xl p-4 text-center">
                    <div class="text-red-400"><i class="fas fa-fist-raised text-xl"></i></div>
                    <div class="text-3xl font-bold mt-1">${p.str}</div>
                    <div class="text-xs text-zinc-400">STRENGTH</div>
                    <div class="text-[10px] text-zinc-500 mt-1">Physical damage</div>
                </div>
                <div class="stat-card bg-zinc-800 rounded-2xl p-4 text-center">
                    <div class="text-blue-400"><i class="fas fa-magic text-xl"></i></div>
                    <div class="text-3xl font-bold mt-1">${p.int}</div>
                    <div class="text-xs text-zinc-400">INTELLECT</div>
                    <div class="text-[10px] text-zinc-500 mt-1">Spell power + Max MP</div>
                </div>
                <div class="stat-card bg-zinc-800 rounded-2xl p-4 text-center">
                    <div class="text-emerald-400"><i class="fas fa-shield-alt text-xl"></i></div>
                    <div class="text-3xl font-bold mt-1">${p.def}</div>
                    <div class="text-xs text-zinc-400">DEFENSE</div>
                    <div class="text-[10px] text-zinc-500 mt-1">Damage reduction</div>
                </div>
            </div>

            <div class="mb-5">
                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">EQUIPMENT</div>
                <div class="bg-zinc-800 rounded-2xl p-4 space-y-3 text-sm">
                    <div class="flex justify-between">
                        <span class="text-zinc-400">Weapon</span> 
                        <span class="font-medium">${p.weapon.name} <span class="text-amber-400">(+${p.weapon.bonus})</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-zinc-400">Armor</span> 
                        <span class="font-medium">${p.armor.name} <span class="text-amber-400">(+${p.armor.bonus || 0})</span></span>
                    </div>
                </div>
            </div>

            <div class="mb-5">
                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">KNOWN MAGIC</div>
                <div class="bg-zinc-800 rounded-2xl p-4 text-sm space-y-1.5">
                    ${p.spells.map(s => {
                        if (s === 'Firebolt') return `<div><span class="text-blue-400">• Firebolt</span> — Strong INT scaling</div>`;
                        if (s === 'Ice Shard') return `<div><span class="text-cyan-400">• Ice Shard</span> — High damage spell</div>`;
                        if (s === 'Heal') return `<div><span class="text-emerald-400">• Heal</span> — INT powered recovery</div>`;
                        return `<div>• ${s}</div>`;
                    }).join('')}
                </div>
            </div>

            <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">COMBAT PREVIEW</div>
            <div class="bg-zinc-800/70 rounded-2xl p-4 text-sm grid grid-cols-2 gap-y-2">
                <div class="text-zinc-400">Sword Damage</div>
                <div class="font-mono text-right">~${weaponDmg}</div>
                <div class="text-zinc-400">Firebolt Power</div>
                <div class="font-mono text-right text-blue-400">~${spellPower}</div>
            </div>

            <div class="mt-6 text-center">
                <button onclick="this.closest('.fixed').remove()" class="px-8 py-2.5 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm">Close</button>
            </div>
        </div>
    `;
    document.body.appendChild(div);
}

function renameCharacter() {
    const n = prompt("What is your name?", state.player.name);
    if (n) { state.player.name = n; updateAll(); }
}

function exportLogs() {
    const data = {time: new Date().toISOString(), player: state.player, location: state.locationName, inventory: state.inventory, story: state.story};
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
    a.download = `spellblade-log-${Date.now()}.json`;
    a.click();
}

function save() { localStorage.setItem('spellblade_v3', JSON.stringify(state)); }

function load() {
    const s = localStorage.getItem('spellblade_v3');
    if (s) { try { Object.assign(state, JSON.parse(s)); recalculateMaxStats(); } catch(e){} }
}

function init() {
    load();
    recalculateMaxStats();
    villageSpot = 'square';
    if (state.story.length === 0) {
        setTimeout(() => { showIntro(); }, 800);
    }
    document.getElementById('combat').classList.add('hidden');
    updateAll();
}
window.onload = init;
</script>
</body>
</html>
